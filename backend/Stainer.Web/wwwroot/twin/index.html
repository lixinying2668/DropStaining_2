<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>冰免染色机</title>
<style>
  :root {
    --bg:#f5f7fb; --panel:#ffffff; --ink:#172033; --muted:#718096; --line:#d8dee9;
    --blue:#2563eb; --cyan:#06b6d4; --green:#10b981; --amber:#f59e0b; --red:#ef4444;
    --purple:#7c3aed; --reagent:#facc15; --work:#e0f2fe; --metal:#94a3b8;
    --shadow: 0 12px 34px rgba(15, 23, 42, .10);
    --radius: 18px;
    --right-panel-width:440px;
  }
  * { box-sizing: border-box; }
  html, body { height:100%; margin:0; font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif; background:var(--bg); color:var(--ink); }
  body { overflow:hidden; }
  .app { height:100vh; display:grid; grid-template-rows:64px 1fr; }
  header {
    display:flex; align-items:center; justify-content:space-between; gap:20px;
    padding:8px 16px; background:linear-gradient(90deg,#0f172a,#1e3a8a 56%,#0f766e);
    color:white; box-shadow:0 8px 24px rgba(15,23,42,.18); z-index:2;
  }
  .brand { display:flex; align-items:center; gap:14px; min-width:220px; }
  .logo { width:42px; height:42px; border-radius:12px; background:rgba(255,255,255,.14); display:grid; place-items:center; font-weight:800; letter-spacing:.04em; border:1px solid rgba(255,255,255,.24); }
  .brand h1 { margin:0; font-size:24px; line-height:1.1; }
  .brand small { display:block; margin-top:4px; opacity:.78; font-size:12px; }
  .top-status { display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
  .top-action, .mode-btn { border:1px solid rgba(255,255,255,.28); background:rgba(255,255,255,.12); color:#fff; border-radius:999px; padding:7px 12px; min-height:34px; font-size:13px; cursor:pointer; transition:.16s ease; }
  .top-action:hover, .mode-btn:hover { background:rgba(255,255,255,.20); transform:translateY(-1px); }
  .mode-switch { display:flex; gap:4px; padding:3px; border:1px solid rgba(255,255,255,.22); background:rgba(15,23,42,.18); border-radius:999px; }
  .mode-btn { border-color:transparent; background:transparent; padding:5px 10px; min-height:28px; }
  .mode-btn.active { background:#fff; color:#1e3a8a; box-shadow:0 4px 12px rgba(15,23,42,.18); }
  .pill { border:1px solid rgba(255,255,255,.24); background:rgba(255,255,255,.10); border-radius:999px; padding:6px 9px; font-size:13px; display:flex; align-items:center; gap:6px; white-space:nowrap; }
  .dot { width:9px; height:9px; border-radius:50%; background:var(--green); box-shadow:0 0 0 4px rgba(16,185,129,.2); display:inline-block; }
  .dot.warn { background:var(--amber); box-shadow:0 0 0 4px rgba(245,158,11,.20); }
  .dot.err { background:var(--red); box-shadow:0 0 0 4px rgba(239,68,68,.20); }
  main { display:grid; grid-template-columns:minmax(0, 1fr) 8px var(--right-panel-width, 416px); gap:0; padding:6px; min-height:0; overflow:hidden; }
  .stage-card, .side-card { background:var(--panel); border:1px solid #e6ebf3; border-radius:var(--radius); box-shadow:var(--shadow); min-height:0; }
  .stage-card { display:grid; grid-template-rows:1fr; overflow:hidden; min-width:0; }
  .stage-toolbar { display:flex; align-items:center; justify-content:flex-end; padding:10px 14px; border-bottom:1px solid #e8edf5; background:linear-gradient(180deg,#fff,#f8fafc); }
  .toolbar-left, .toolbar-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  button, .file-label {
    border:1px solid #d8e0ec; background:#fff; color:#172033; border-radius:12px; padding:9px 12px; font-size:13px;
    cursor:pointer; min-height:38px; transition:.16s ease; user-select:none;
  }
  button:hover, .file-label:hover { border-color:#94a3b8; transform:translateY(-1px); box-shadow:0 4px 10px rgba(15,23,42,.08); }
  button.primary { background:linear-gradient(180deg,#3b82f6,#2563eb); color:white; border-color:#2563eb; }
  button.danger { background:#fff1f2; color:#be123c; border-color:#fecdd3; }
  button.ghost { background:#f8fafc; }
  button:disabled { opacity:.45; cursor:not-allowed; transform:none; box-shadow:none; }
  input[type=file] { display:none; }
  .map-wrap { position:relative; padding:0; overflow:hidden; background:
    radial-gradient(circle at 20% 16%, rgba(37,99,235,.08), transparent 24%),
    linear-gradient(180deg,#fbfdff,#eef4fb); }
  #twinSvg { width:100%; height:100%; display:block; touch-action:none; }
  .footer-strip { display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center; padding:8px 14px; border-top:1px solid #e8edf5; background:#fbfdff; }
  .legend { display:flex; gap:10px; align-items:center; flex-wrap:wrap; font-size:12px; color:#475569; }
  .legend span { display:flex; align-items:center; gap:6px; }
  .legend-title { font-weight:800; color:#0f172a; margin-right:2px; }
  .sw { width:13px; height:13px; border-radius:999px; border:1px solid rgba(15,23,42,.12); display:inline-block; }
  .coord-readout { display:none; }
  .side { display:grid; grid-template-rows:1fr; gap:0; min-height:0; }
  .side-card { padding:10px; overflow:hidden; }
  .side-card h2 { font-size:15px; margin:0 0 10px 0; display:flex; align-items:center; justify-content:space-between; }
  .subtle { color:var(--muted); font-size:12px; font-weight:400; }
  .kpi-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:8px; }
  .kpi { border:1px solid #e5eaf3; border-radius:14px; padding:8px 10px; background:#fbfdff; }
  .kpi b { display:inline; font-size:16px; margin:0 6px 0 0; }
  .kpi small { color:#64748b; font-size:11px; display:inline; }
  .kpi-line { display:flex; align-items:baseline; gap:6px; flex-wrap:nowrap; white-space:nowrap; margin-bottom:6px; }
  .progress { height:8px; background:#e9eef7; border-radius:999px; overflow:hidden; }
  .progress > i { display:block; height:100%; width:0%; background:linear-gradient(90deg,#38bdf8,#2563eb); border-radius:999px; transition:width .4s ease; }
  .channels { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .channel-card { border:1px solid #e5eaf3; border-radius:14px; background:#fbfdff; padding:10px; cursor:pointer; transition:.16s ease; }
  .channel-card.selected { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.12); transform:translateY(-1px); }
  .channel-card.open { border-color:#a855f7; background:#faf5ff; }
  .channel-head { display:flex; justify-content:space-between; gap:6px; align-items:center; font-size:13px; font-weight:700; }
  .state-chip { padding:3px 7px; border-radius:999px; font-size:11px; font-weight:700; color:#475569; background:#e2e8f0; }
  .state-chip.running { color:#1d4ed8; background:#dbeafe; } .state-chip.complete { color:#047857; background:#d1fae5; } .state-chip.error { color:#be123c; background:#ffe4e6; } .state-chip.open { color:#7e22ce; background:#f3e8ff; }
  .slide-tags { display:flex; gap:4px; margin:8px 0; }
  .slide-tags i { flex:1; height:22px; border-radius:7px; background:#e2e8f0; display:grid; place-items:center; font-style:normal; font-size:10px; color:#64748b; }
  .slide-tags i.has { background:#e0f2fe; color:#075985; } .slide-tags i.run { background:#dbeafe; color:#1d4ed8; } .slide-tags i.done { background:#d1fae5; color:#047857; }
  .liquid-list { display:grid; gap:8px; }
  .liquid-row { display:grid; grid-template-columns:56px 1fr 42px; gap:8px; align-items:center; font-size:12px; }
  .bar { height:10px; background:#e2e8f0; border-radius:999px; overflow:hidden; }
  .bar i { display:block; height:100%; background:linear-gradient(90deg,#22c55e,#06b6d4); width:70%; transition:width .4s ease, background .4s ease; }
  .bar.warn i { background:linear-gradient(90deg,#f59e0b,#f97316); } .bar.err i { background:linear-gradient(90deg,#ef4444,#dc2626); }
  .detail-box { border:1px solid #e5eaf3; border-radius:14px; background:#fbfdff; padding:10px; min-height:112px; font-size:12px; color:#334155; }
  .status-card { display:grid; gap:10px; }
  .status-subtitle { margin:0; color:#64748b; font-size:12px; font-weight:800; }
  .detail-box strong { display:block; font-size:14px; color:#111827; margin-bottom:6px; }
  .log-card { min-height:0; display:grid; grid-template-rows:auto 1fr; }
  .tab-head { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:10px; }
  .tab-title { font-size:15px; font-weight:800; }
  .tab-buttons { display:flex; gap:4px; border:1px solid #e5eaf3; border-radius:999px; padding:3px; background:#f8fafc; }
  .tab-btn { min-height:26px; padding:3px 8px; border-radius:999px; border:0; background:transparent; color:#475569; font-size:12px; }
  .tab-btn.active { background:#2563eb; color:#fff; box-shadow:0 3px 8px rgba(37,99,235,.22); }
  .tab-pane { min-height:0; display:none; }
  .tab-pane.active { display:block; }
  .log-list { overflow:auto; border:1px solid #e5eaf3; border-radius:14px; background:#0f172a; padding:10px; color:#dbeafe; font-family:ui-monospace, SFMono-Regular, Consolas, monospace; font-size:12px; }
  .log-list p { margin:0 0 8px 0; line-height:1.35; } .log-list .warn { color:#fbbf24; } .log-list .err { color:#fb7185; } .log-list .ok { color:#86efac; }
  .svg-label { fill:#334155; font-weight:700; font-size:13px; paint-order:stroke; stroke:#fff; stroke-width:3px; stroke-linejoin:round; }
  .zone-label { fill:#0f172a; font-size:15px; font-weight:800; }
  .zone-badge { fill:rgba(255,255,255,.92); stroke:#cbd5e1; stroke-width:1.2; rx:14; filter:url(#softShadow); }
  .zone-badge.reagent { fill:rgba(254,240,138,.95); stroke:#facc15; }
  .zone-badge.work { fill:rgba(224,242,254,.96); stroke:#7dd3fc; }
  .zone-badge.service { fill:rgba(243,232,255,.96); stroke:#c4b5fd; }
  .zone-badge-text { fill:#0f172a; font-size:15px; font-weight:800; letter-spacing:.02em; }
  .level-bg { fill:#ffffff; stroke:#dbe2ea; stroke-width:1.8; opacity:.98; }
  .level-sector { opacity:.92; }
  .level-core { fill:rgba(255,255,255,.96); stroke:#ffffff; stroke-width:1.2; }
  .level-text { fill:#334155; font-size:10px; font-weight:700; }
  .mix-code-text { fill:#0f172a; font-size:11px; font-weight:800; paint-order:stroke; stroke:#fff; stroke-width:2.6px; }
  .mix-pct-text { fill:#0f172a; font-size:12px; font-weight:800; paint-order:stroke; stroke:#fff; stroke-width:2.6px; }
  .slide-temp-text { fill:#0284c7; font-size:11px; font-weight:600; paint-order:stroke; stroke:#fff; stroke-width:2.4px; }
  .slide-index-text { fill:#0f172a; font-size:12px; font-weight:800; paint-order:stroke; stroke:#fff; stroke-width:2.4px; }
  .channel-btn { fill:rgba(255,255,255,.96); stroke:#93c5fd; stroke-width:1.4; rx:10; cursor:pointer; }
  .channel-btn.active { stroke:#2563eb; fill:#dbeafe; }
  .channel-btn-text { fill:#0f172a; font-size:12px; font-weight:800; pointer-events:none; }
  .clickable-part { cursor:pointer; }
  .op-pill { stroke-width:1.5; }
  .op-pill-text { font-size:8px; font-weight:800; text-anchor:middle; dominant-baseline:central; }
  .footer-op-legend { display:flex; gap:10px; align-items:center; justify-self:end; flex-wrap:wrap; font-size:12px; color:#475569; }
  .footer-op-legend span { display:flex; align-items:center; gap:6px; }
  .footer-op-title { font-weight:800; color:#0f172a; margin-right:2px; }
  .shape-icon { display:inline-block; width:12px; height:12px; color:inherit; }
  .shape-icon.circle { border:2px solid currentColor; border-radius:50%; background:#fff; }
  .shape-icon.square { border:2px solid currentColor; background:#fff; border-radius:2px; }
  .shape-icon.triangle { width:0; height:0; border-left:7px solid transparent; border-right:7px solid transparent; border-bottom:12px solid currentColor; }
  .shape-icon.diamond { border:2px solid currentColor; background:#fff; transform:rotate(45deg); width:10px; height:10px; }
  .op-c1 { color:#2563eb; } .op-c2 { color:#10b981; } .op-c3 { color:#f59e0b; } .op-c4 { color:#7c3aed; } .op-c5 { color:#0891b2; }
  .port-hole { fill:#ffffff; stroke:#64748b; stroke-width:1.5; }
  .port-hole.waste { stroke:#f59e0b; }
  .port-hole.toxic { stroke:#ef4444; }
  .port-hole.clean { stroke:#06b6d4; }
  .port-hole.active { filter:drop-shadow(0 0 6px rgba(37,99,235,.35)); }
  .port-label { fill:#475569; font-size:9px; font-weight:700; paint-order:stroke; stroke:#fff; stroke-width:2px; }
  .camera-housing { fill:#111827; stroke:#334155; stroke-width:1.4; filter:drop-shadow(0 3px 4px rgba(15,23,42,.22)); }
  .camera-mount { fill:#334155; stroke:#475569; stroke-width:1.1; }
  .camera-lens { fill:#93c5fd; stroke:#1d4ed8; stroke-width:1.2; }
  .camera-inner { fill:#e0f2fe; opacity:.95; }
  .camera-status { stroke:#ffffff; stroke-width:1.2; }
  .camera-status.idle { fill:#94a3b8; }
  .camera-status.active { fill:#2563eb; animation:pulseCamera 1s infinite; }
  .camera-status.complete { fill:#22c55e; }
  .camera-status.error { fill:#ef4444; animation:pulseCamera .75s infinite; }
  .camera-beam { fill:#60a5fa; opacity:.16; animation:beamPulse 1s infinite; }
  .camera-mark { fill:#334155; font-size:10px; font-weight:800; paint-order:stroke; stroke:#fff; stroke-width:2px; }
  .camera-state-text { fill:#475569; font-size:9px; font-weight:700; paint-order:stroke; stroke:#fff; stroke-width:2px; }
  .arm-fluid-a { fill:#ef4444; }
  .arm-fluid-b { fill:#3b82f6; }
  .arm-fluid-mix { fill:#10b981; }
  .arm-fluid-reagent { fill:#f59e0b; }
  .arm-fluid-empty { fill:#ffffff; }
  .needle-shell { stroke:#334155; stroke-width:1.4; }
  .needle-liquid-ring { fill:none; stroke-width:2; opacity:.9; }
  .slide-step-label { fill:#334155; font-size:9px; font-weight:700; }
  .reagent-zone-legend-title { fill:#0f172a; font-size:10px; font-weight:900; paint-order:stroke; stroke:#fff; stroke-width:2.2px; }
  .reagent-zone-legend-text { fill:#334155; font-size:9px; font-weight:800; paint-order:stroke; stroke:#fff; stroke-width:2px; }
  .reagent-zone-legend-dot { stroke:#ffffff; stroke-width:1.1; }
  .work-op-legend-box { fill:rgba(255,255,255,.88); stroke:#38bdf8; stroke-width:1.5; rx:12; filter:url(#softShadow); }
  .work-op-legend-title { fill:#0f172a; font-size:10px; font-weight:900; paint-order:stroke; stroke:#fff; stroke-width:2.2px; }
  .work-op-legend-text { fill:#334155; font-size:8.5px; font-weight:800; paint-order:stroke; stroke:#fff; stroke-width:1.8px; }
  .zone { fill:rgba(255,255,255,.52); stroke:#cbd5e1; stroke-width:1.4; rx:16; }
  .zone.reagent { fill:rgba(250,204,21,.09); stroke:#facc15; } .zone.work { fill:rgba(14,165,233,.08); stroke:#7dd3fc; } .zone.service { fill:rgba(124,58,237,.06); stroke:#c4b5fd; }
  .grid-line { stroke:#e2e8f0; stroke-width:.8; stroke-dasharray:4 6; }
  .axis { stroke:#64748b; stroke-width:1.2; marker-end:url(#arrow); }
  .axis-text { fill:#475569; font-size:11px; font-family:ui-monospace, Consolas, monospace; }
  .part circle, .part rect { transition:fill .2s ease, stroke .2s ease, opacity .2s ease, filter .2s ease, transform .2s ease; cursor:pointer; }
  .part text { pointer-events:none; user-select:none; }
  .part.reagent circle { stroke:#a16207; stroke-width:1.2; }
  .part.wash circle { fill:#dbeafe; stroke:#2563eb; stroke-width:1.2; }
  .part.mix circle { stroke:#0f766e; stroke-width:1.2; }
  .part.ab circle { stroke:#be123c; stroke-width:1.4; }
  .part.motor rect { fill:#d1d5db; stroke:#475569; stroke-width:1.4; }
  .part.slide rect { fill:#e2e8f0; stroke:#64748b; stroke-width:1.2; rx:3; }
  .part[data-state="scanned"] circle, .part[data-state="scanned"] rect { stroke:#047857; stroke-width:1.6; }
  .part[data-state="ready"] circle, .part[data-state="ready"] rect { stroke:#1d4ed8; stroke-width:1.6; }
  .part[data-state="running"] circle, .part[data-state="running"] rect { stroke:#1d4ed8; stroke-width:1.9; filter:drop-shadow(0 0 7px rgba(37,99,235,.45)); }
  .part[data-state="complete"] circle, .part[data-state="complete"] rect { stroke:#15803d; stroke-width:1.8; }
  .part[data-state="low"] circle, .part[data-state="low"] rect { stroke:#b45309; stroke-width:1.9; animation:pulseWarn 1s infinite; }
  .part[data-state="error"] circle, .part[data-state="error"] rect { stroke:#be123c; stroke-width:1.9; animation:pulseErr .8s infinite; }
  .part[data-active="true"] circle, .part[data-active="true"] rect { stroke:#111827; stroke-width:3.2; filter:drop-shadow(0 0 8px rgba(15,23,42,.35)); }
  .part.dim { opacity:.35; }
  .channel-tray { fill:rgba(148,163,184,.10); stroke:#94a3b8; stroke-width:1.3; rx:7; transition:.2s ease; }
  .channel-tray.selected { stroke:#1d4ed8; stroke-width:3; filter:drop-shadow(0 0 8px rgba(37,99,235,.25)); }
  .channel-tray.running { fill:rgba(96,165,250,.13); stroke:#2563eb; }
  .channel-tray.complete { fill:rgba(52,211,153,.15); stroke:#059669; }
  .channel-tray.open { fill:rgba(192,132,252,.18); stroke:#8b5cf6; animation:pulseOpen 1s infinite; }
  .arm-rail { stroke:#334155; stroke-width:10; stroke-linecap:round; opacity:.88; }
  .arm-rail-light { stroke:#cbd5e1; stroke-width:3; stroke-linecap:round; }
  .arm-y { stroke:#111827; stroke-width:7; stroke-linecap:round; filter:drop-shadow(0 5px 8px rgba(15,23,42,.18)); }
  .arm-head { fill:#111827; stroke:#fff; stroke-width:2; }
  .arm-main-hit { fill:transparent; stroke:transparent; pointer-events:all; }
  .needle { fill:#f8fafc; stroke:#0f172a; stroke-width:1.5; }
  .needle.extended { fill:#60a5fa; filter:drop-shadow(0 0 7px rgba(37,99,235,.5)); }
  .needle.warn { fill:#f59e0b; }
  .needle-line { stroke:#0f172a; stroke-width:1.2; }
  .path { fill:none; stroke:#2563eb; stroke-width:2.2; stroke-dasharray:7 6; opacity:.35; }
  .path-segment { fill:none; stroke-width:2.4; stroke-linecap:round; }
  .path-past { stroke:#94a3b8; stroke-dasharray:7 7; opacity:.42; }
  .path-future { stroke:#ffffff; stroke-dasharray:1 8; opacity:.95; filter:drop-shadow(0 0 2px rgba(15,23,42,.55)); }
  .target-halo { fill:none; stroke:#2563eb; stroke-width:2; opacity:.8; animation:halo 1.1s infinite ease-out; }
  .control-flash { animation:controlFlash .58s ease; }
  .svg-control-flash rect, .svg-control-flash circle { animation:svgControlFlash .58s ease; }

  @keyframes svgControlFlash { 0%,100% { filter:drop-shadow(0 0 0 rgba(37,99,235,0)); } 45% { filter:drop-shadow(0 0 12px rgba(37,99,235,.72)); } }

  header { display:grid; grid-template-columns:220px minmax(360px, 1fr) minmax(360px, auto); align-items:center; }
  .header-center { display:flex; align-items:center; justify-content:center; gap:10px; min-width:0; }
  .header-stats { display:flex; align-items:center; justify-content:flex-end; gap:7px; flex-wrap:nowrap; position:relative; }
  .top-action.start { background:linear-gradient(180deg,#22c55e,#16a34a); color:#fff; border-color:rgba(255,255,255,.35); font-weight:800; min-width:68px; }
  .top-action.precheck { background:rgba(255,255,255,.18); font-weight:800; min-width:68px; }
  .top-action:disabled { opacity:.45; cursor:not-allowed; transform:none; }
  main { grid-template-columns:minmax(0, 1fr) 8px var(--right-panel-width, 416px); gap:0; padding:6px; overflow:hidden; }
  .stage-card { display:grid; grid-template-rows:1fr; overflow:hidden; min-width:0; }
  .map-wrap { min-height:0; min-width:0; }
  .side { display:grid; grid-template-rows:1fr; gap:0; min-height:0; }
  .console-card { display:grid; grid-template-rows:auto 1fr; min-height:0; }
  .console-head { margin-bottom:10px; }
  .console-body { min-height:0; display:grid; }
  .console-pane { min-height:0; display:none; overflow:auto; }
  .console-pane.active { display:block; }
  .precheck-tab-hidden { display:none !important; }
  .precheck-intro { border:1px solid #e5eaf3; border-radius:14px; background:#f8fafc; padding:10px 12px; margin-bottom:10px; display:grid; gap:4px; }
  .precheck-intro strong { font-size:14px; color:#0f172a; }

  .precheck-flow { display:grid; gap:7px; padding-left:2px; }

  .precheck-step::before { content:""; position:absolute; left:18px; top:32px; width:1px; height:14px; background:#dbe2ea; }

function getReagentLaneCenters() {

    const items = reagents.filter(item => Number(item.col) === c);
    if(items.length) lanes.push({ lane:c, x:items.reduce((sum, item) => sum + item.x, 0) / items.length, items });

}

  const y1Mm = Math.min(...all.map(item => item.y)) - 10.5;
  const y2Mm = Math.max(...all.map(item => item.y)) + 10.5;
  for(let i=0; i<lanes.length-1; i++) {

function polarToCartesian(cx, cy, r, angle) {
  const rad = (angle - 90) * Math.PI / 180.0;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

  const start = polarToCartesian(cx, cy, r, endAngle);
  const end = polarToCartesian(cx, cy, r, startAngle);
  const largeArcFlag = endAngle - startAngle <= 180 ? '0' : '1';
  return ['M', start.x, start.y, 'A', r, r, 0, largeArcFlag, 0, end.x, end.y].join(' ');
}
function describeSector(cx, cy, r, startAngle, endAngle) {
  const safeEnd = Math.max(startAngle + 1, Math.min(endAngle, startAngle + 359.99));
  const start = polarToCartesian(cx, cy, r, startAngle);
  const end = polarToCartesian(cx, cy, r, safeEnd);
  const largeArcFlag = safeEnd - startAngle <= 180 ? '0' : '1';
  return ['M', cx, cy, 'L', start.x, start.y, 'A', r, r, 0, largeArcFlag, 1, end.x, end.y, 'Z'].join(' ');
}

function getSlideOpSlots(cx, cy, w, h, count) {
  const off = mmSize(3.7), sideOff = mmSize(3.9);

  const rightYs = [cy + h*0.42, cy + h*0.14, cy - h*0.14, cy - h*0.42];
  const slots = [
    [leftX, leftYs[0]], [leftX, leftYs[1]], [leftX, leftYs[2]], [leftX, leftYs[3]],
    [bottomXs[0], bottomY], [bottomXs[1], bottomY], [bottomXs[2], bottomY], [bottomXs[3], bottomY],

// 液位阈值同步到后端专用配置 API（pct × 容量 → μL）。容量取自 fluidics/state，非硬编码。
async function syncLiquidThresholdsToBackend() {
  try {
    const state = await backendApi('/api/fluidics/state');
    const liquids = state?.liquidLevels || [];
    const cap = st => { const l = liquids.find(x => (x.sourceType || x.SourceType) === st); return l ? (l.capacityUl ?? l.CapacityUl) ?? null : null; };
    const pctToUl = (pct, st) => { const c = cap(st); let p = Number(pct); if(!Number.isFinite(p)) return null; p = Math.max(0, Math.min(100, p)); return Number.isFinite(c) ? Math.round(p / 100 * c) : null; };
    const jobs = [
      { sourceType: 'SystemWater', lowThresholdUl: pctToUl(appSettings.pureLowThresholdPct, 'SystemWater') },
      { sourceType: 'PBS', lowThresholdUl: pctToUl(appSettings.pbsLowThresholdPct, 'PBS') },
      { sourceType: 'Waste', fullThresholdUl: pctToUl(appSettings.wasteFullThresholdPct, 'Waste') },
      { sourceType: 'ToxicWaste', fullThresholdUl: pctToUl(appSettings.toxicFullThresholdPct, 'ToxicWaste') }
    ];
    let synced = 0;
    for(const j of jobs) {
      const body = { commandId: makeCommandId('threshold-' + j.sourceType), sourceType: j.sourceType, reason: 'twin 阈值保存' };
      if(j.lowThresholdUl != null) body.lowThresholdUl = j.lowThresholdUl;
      if(j.fullThresholdUl != null) body.fullThresholdUl = j.fullThresholdUl;
      if(body.lowThresholdUl == null && body.fullThresholdUl == null) continue;
      await writeApi('/api/fluidics/level-thresholds', { method:'POST', body: JSON.stringify(body) });
      synced++;
    }
    // 静默同步：液位阈值随"保存设置"一起落库，但不单独打日志，避免与运行参数日志重复刷屏。
  } catch(err) { /* routed by writeApi */ }
}

function normalizeSlideSlotInput(value, drawerLetter) {
  const raw = String(value || '').trim().toUpperCase();
  if(!raw) return null;
  const compact = raw.replace(/\s+/g, '');
  if(/^[1-4]$/.test(compact)) return `${drawerLetter}-${compact.padStart(2, '0')}`;
  const fullMatch = compact.match(/^([A-D])[-_]?0?([1-4])$/);
  if(fullMatch && fullMatch[1] === drawerLetter) return `${drawerLetter}-${fullMatch[2].padStart(2, '0')}`;
  return null;
}
function parseHeSlideSlots(input, drawerLetter) {

  return String(input || '')
    .split(/[,\s，、;；]+/)
    .map(x => normalizeSlideSlotInput(x, drawerLetter))
    .filter(Boolean)
    .filter(slot => {
      if(seen.has(slot)) return false;
      seen.add(slot);
      return true;
    });
}


async function intakeChannelSamples(channelId) {
  const letter = letterForChannel(channelId);
  const ch = channels[channelId - 1];
  if(!ch) return;
  if(channelScanningBusy) { log(`通道${letter} 正在处理入库，请稍后再试`, 'warn', channelId); return; }

  let requestedSlides = [];
  let experimentType = '';
  channelScanningBusy = true;
  try {
    // 先读取通道批次与已选染色流程，让操作员在输入槽位前确认正在向哪个流程添加玻片。
    // 入库前先读取活动通道批次及其已绑定脚本；实验类型由通道批次决定，不再由操作员输入，
    // 也不再隐式绑定系统默认脚本——脚本必须在“通道状态 → 对象详情”中选择并“应用到通道”。
    setInfoPanel(`通道${letter} 样本入库准备中`, ['正在读取通道批次与已绑定染色流程...']);
    const activeResp = await writeApi('/api/channel-batches/active', { method:'POST', body: JSON.stringify({ commandId: makeCommandId('channel-active'), drawerCode: letter }) });
    const channelBatchId = activeResp?.channelBatchId || null;
    const workflowSelectionStatus = String(activeResp?.workflowSelectionStatus || '');
    const selectedWorkflowVersionId = activeResp?.selectedWorkflowVersionId || activeResp?.workflowVersionId || null;
    experimentType = String(activeResp?.experimentType || '').toUpperCase();

    // 门禁：必须已绑定已发布脚本（Selected + workflowVersionId + HE/IHC）；否则引导到通道详情选择脚本。
    // 不创建任务、不调用 experiment-type-selection、不自动绑定系统默认脚本。
    if(workflowSelectionStatus !== 'Selected' || !selectedWorkflowVersionId || !['HE','IHC'].includes(experimentType)) {
      setInfoPanel(`通道${letter} 尚未选择已发布脚本`, [
        `通道 ${letter} 尚未选择已发布脚本。`,
        `请单击通道，进入“状态 → 对象详情”，选择已发布脚本后点击“应用到通道”，再进行样本入库。`
      ]);
      log(`通道${letter} 未绑定已发布脚本，已引导至通道详情`, 'warn', channelId);
      showChannelDetail(channelId);
      return;
    }
    if(!channelBatchId) { log(`通道${letter} 未获取到活动通道批次`, 'err', channelId); return; }

    const occupiedSlots = new Set((activeResp?.occupiedSlotCodes || []).map(x => String(x || '').toUpperCase()));

    // 汇总当前已选流程信息（HE/IHC 均显示流程名/版本；IHC 额外显示流程解析出的一抗）。
    const workflowInfoLines = [];
    if(activeResp?.selectedWorkflowName) workflowInfoLines.push(`已选流程：${activeResp.selectedWorkflowName}`);
    if(activeResp?.selectedWorkflowVersionLabel) workflowInfoLines.push(`流程版本：${activeResp.selectedWorkflowVersionLabel}`);
    if(experimentType === 'IHC') {
      const paCode = activeResp?.primaryAntibodyCode || null;
      if(paCode) {
        const reagentName = [...itemReagentCodes.entries()].find(([, c]) => String(c || '').toUpperCase() === String(paCode).toUpperCase())?.[0];
        workflowInfoLines.push(`流程一抗编码：${paCode}`);
        workflowInfoLines.push(`试剂名称：${reagentName || paCode}`);
      } else {
        workflowInfoLines.push('流程一抗编码：未解析到一抗（请检查流程配置）');
      }
    }

    // 输入槽位前先展示当前已选流程，供操作员确认目标流程。
    setInfoPanel(`通道${letter} ${experimentType} 样本入库`, [
      `实验类型：${experimentType}`,
      ...workflowInfoLines,
      '请在下方弹窗输入实际放置的玻片槽位。'
    ]);

    const scriptLabel = [activeResp?.selectedWorkflowName, activeResp?.selectedWorkflowVersionLabel].filter(Boolean).join(' ') || '已绑定脚本';
    const slotInput = prompt(`通道 ${letter} · ${experimentType} · ${scriptLabel}：请输入实际放置玻片槽位\n可输入：1,3 或 ${letter}-01,${letter}-03`, '1');
    requestedSlides = parseHeSlideSlots(slotInput, letter).map(slotCode => ({ slotCode }));
    if(!requestedSlides.length) { log(`通道${letter} 未选择任何 ${experimentType} 玻片槽位`, 'warn', channelId); return; }

    const duplicatedSlots = requestedSlides.map(x => x.slotCode).filter(x => occupiedSlots.has(x));
    if(duplicatedSlots.length) {
      setInfoPanel(`通道${letter} 样本入库未执行`, [
        `已占用槽位：${Array.from(occupiedSlots).join('、') || '--'}`,
        `本次重复选择：${duplicatedSlots.join('、')}`,
        '请只选择实际空闲槽位，或先清理当前通道批次。'
      ]);
      log(`通道${letter} 槽位已占用：${duplicatedSlots.join('、')}`, 'warn', channelId);
      return;
    }

    setInfoPanel(`通道${letter} 样本入库中`, [
      `实验类型：${experimentType}`,
      ...workflowInfoLines,
      `实际槽位：${requestedSlides.map(x => x.slotCode).join('、')}`,
      '正在创建任务...'
    ]);

    let createdCount = 0;
    for(const slide of requestedSlides) {
      const taskApiPath = experimentType === 'HE' ? 'he' : 'ihc';
      const commandId = makeCommandId('task-' + taskApiPath);
      const body = { commandId, slotCode:slide.slotCode, drawerCode:letter, channelBatchId };
      try {
        await backendApi('/api/tasks/' + taskApiPath, { method:'POST', body: JSON.stringify(body) });
        createdCount++;
        log(`通道${letter} 玻片入库完成：${slide.slotCode} (${experimentType})`, 'ok', channelId);
      } catch(err) {
        if(err?.status === 409 && (err?.data?.code === 'slot_not_idle' || /not idle/i.test(err.message || ''))) {
          log(`通道${letter} ${slide.slotCode} 已占用，请核对实际放片位置`, 'warn', channelId);
          continue;
        }
        routeWriteError(err);
      }
    }
    if(createdCount) {
      ch.barcodeReady = true;
      log(`通道${letter} 已按实际槽位入库 ${createdCount}/${requestedSlides.length} 张玻片`, createdCount === requestedSlides.length ? 'ok' : 'warn', channelId);
      setInfoPanel(`通道${letter} 样本入库完成`, [
        `实验类型：${experimentType}`,
        ...workflowInfoLines,
        `实际槽位：${requestedSlides.map(x => x.slotCode).join('、')}`,
        `入库成功：${createdCount}/${requestedSlides.length} 张玻片`
      ]);
    } else {
      log(`通道${letter} 未创建任何玻片任务`, 'warn', channelId);
    }
    await loadDatabaseSnapshot();
  } catch(err) {
    const message = err?.message || '请查看日志获取详细原因';
    setInfoPanel(`通道${letter} 样本入库失败`, [
      `实验类型：${experimentType}`,
      `实际槽位：${requestedSlides.map(x => x.slotCode).join('、') || '--'}`,
      message
    ]);
    log(`通道${letter} 样本入库失败：${message}`, 'err', channelId);
  }
  finally { channelScanningBusy = false; }
}

async function startChannelBarcode(channelId) {
  const ch = channels[channelId - 1]; if(!ch) return;
  if(channelScanningBusy) {
    setInfoPanel('扫码任务繁忙', ['机械臂样本扫码器正在执行其他通道的扫码任务，请稍后再试。']);
    log(`通道${channelId}扫码任务被拦截：机械臂样本扫码器正在忙碌`, 'warn', channelId);
    return;
  }
  if(running && !paused) {
    setInfoPanel('流程运行中', [`主演示流程正在运行，通道${channelId}的扫码任务无法下发。`, '请先点击暂停，或等待主流程完成后再试。']);
    log(`通道${channelId}扫码任务被拦截：主演示流程运行中`, 'warn', channelId);
    return;
  }
  const allSlides = (byCategory.get('玻片通道') || []).filter(s => getChannelIdFromName(s.name) === channelId);
  const newSlides = allSlides.filter(s => itemState.get(s.name) !== 'scanned');
  if(!newSlides.length) {
    selectedChannel = channelId;
    setInfoPanel(`通道${channelId}无需新增扫码`, [`通道${channelId} 的所有玻片已完成条码扫描入库。`, `玻片列表：${allSlides.map(s=>s.name).join('、')}`]);
    showChannelDetail(channelId);
    log(`通道${channelId}点击开始：所有玻片已扫描，无需重复操作`, '', channelId);
    return;
  }
  channelScanningBusy = true;
  cancelAnimation = false;
  selectedChannel = channelId;
  cameraStates.arm = 'active';
  updateArmVisual();
  const slideNames = newSlides.map(s => s.name);
  setInfoPanel(`通道${channelId}已下发扫码任务`, [
    '机械臂样本扫码器正在前往扫描以下新增玻片：',
    ...slideNames.map((name, i) => `${i+1}. ${name} (X ${Number(newSlides[i].x).toFixed(1)} / Y ${Number(newSlides[i].y).toFixed(1)})`),
    '请等待扫描完成...'
  ]);
  log(`通道${channelId}已下发扫码任务：机械臂样本扫码器正在前往扫描 ${newSlides.length} 张新增玻片`, 'ok', channelId);
  let scanned = 0;
  for(let i=0; i<newSlides.length; i++) {
    if(cancelAnimation) break;
    const s = newSlides[i];
    const targetX = Number(s.x), targetY = Number(s.y);
    log(`通道${channelId}扫码进度：机械臂移动到 ${s.name}`, '', channelId);
    const ok = await animateArmTo(targetX, targetY, 0.18, 0.18, 800);
    if(!ok) {
      log(`通道${channelId}扫码任务中断：动画被取消（已扫描 ${scanned}/${newSlides.length}）`, 'warn', channelId);
      break;
    }
    await sleep(200);
    itemState.set(s.name, 'scanned');
    setSlideOp(s.name, 0, true);
    scanned++;
    const remaining = newSlides.slice(i+1).map(x => x.name);
    setInfoPanel(`通道${channelId}扫码进度 (${scanned}/${newSlides.length})`, [
      `已扫码：${s.name} ✓`,
      ...(remaining.length ? ['待扫码：' + remaining.join('、')] : ['全部玻片扫描完成！']),
      `通道${channelId} 新增玻片正在加入染色任务...`
    ]);
    log(`通道${channelId}扫码：${s.name} 扫描完成并入库 (${scanned}/${newSlides.length})`, 'ok', channelId);
    updateVisualStates();
    drawSlideOps();
  }
  cameraStates.arm = 'complete';
  updateArmVisual();
  if(scanned > 0) {
    ch.barcodeReady = true;
    ch.progress = Math.max(ch.progress, 5);
    ch.state = ch.state === 'idle' ? 'ready' : ch.state;
    allSlides.forEach(s => {
      if(itemState.get(s.name) !== 'scanned') itemState.set(s.name, 'scanned');
      setSlideOp(s.name, 0, true);
    });
  }
  channelScanningBusy = false;
  updateVisualStates();
  renderChannelCards();
  if(scanned === newSlides.length) {
    log(`通道${channelId}扫码任务完成：${scanned} 张玻片已入库，染色任务已就绪`, 'ok', channelId);
  }
  showChannelDetail(channelId);
}

// ===== 试剂制冷控制：对象详情四个按钮对接后端 thermal API（不再走通用模拟日志） =====
function parseReagentTempCelsius(raw) {
  // 兼容 "8" / "8.0" / "8℃" / "8 °C" / "-12.5°C" 等写法：取第一个数值
  const match = raw == null ? null : String(raw).trim().match(/-?\d+(\.\d+)?/);
  return match ? Number(match[0]) : NaN;
}
function formatReagentTempCelsius(deciC) {
  const v = Number(deciC);
  return Number.isFinite(v) ? (v / 10).toFixed(1) + '℃' : '—';
}
function reagentCoolingStateLabel(cooling) {
  if(!cooling || cooling.isEnabled === null || cooling.isEnabled === undefined) return '—';
  return cooling.isEnabled ? '启动' : '停止';
}
function updateReagentCoolingSummary(cooling, xMm=null, yMm=null) {
  const summary = document.getElementById('reagentCoolingSummaryText');
  if(!summary) return;
  const displayX = xMm ?? summary.dataset.xMm ?? 0;
  const displayY = yMm ?? summary.dataset.yMm ?? 0;
  summary.textContent = `当前温度：${formatReagentTempCelsius(cooling && cooling.currentTemperatureDeciC)}　目标温度：${formatReagentTempCelsius(cooling && cooling.targetTemperatureDeciC)}　当前制冷状态：${reagentCoolingStateLabel(cooling)}　位置：X ${Number(displayX).toFixed(1)} / Y ${Number(displayY).toFixed(1)}`;
}
async function fetchReagentCoolingState() {
  const state = await backendApi('/api/thermal/state');
  return (state && state.cooling) || null;
}
async function refreshReagentCoolingSummary(xMm=null, yMm=null) {
  updateReagentCoolingSummary(await fetchReagentCoolingState(), xMm, yMm);
}
function applyReagentCoolingInputs(cooling) {
  if(!cooling) return;
  const target = document.getElementById('reagentCoolingTargetInput');
  const current = document.getElementById('reagentCoolingCurrentInput');
  if(target) target.value = formatReagentTempCelsius(cooling.targetTemperatureDeciC);
  if(current) current.value = formatReagentTempCelsius(cooling.currentTemperatureDeciC);
}
function handleReagentCoolingError(err) {
  // 401 走现有登录/错误处理逻辑；其余错误先写一条试剂制冷专用失败日志，再走统一路由
  if(err && err.status === 401) { routeWriteError(err); return; }
  log('试剂制冷控制失败：' + ((err && err.message) || '未知错误'), 'err');
  routeWriteError(err);
}
async function queryReagentCooling() {
  const cooling = await fetchReagentCoolingState();
  // 先刷新 DB 快照（SVG reagentTempText、KPI 温度），再用 thermal state 覆写两个输入框，
  // 避免 applyDatabaseSnapshot 用 control_values 把刚查询到的目标/当前温度覆盖回去
  if(typeof loadDatabaseSnapshot === 'function') { try { await loadDatabaseSnapshot(); } catch(_) {} }
  applyReagentCoolingInputs(cooling);
  updateReagentCoolingSummary(cooling);
  log(`查询试剂制冷温度：当前 ${formatReagentTempCelsius(cooling && cooling.currentTemperatureDeciC)} / 目标 ${formatReagentTempCelsius(cooling && cooling.targetTemperatureDeciC)} / 制冷 ${reagentCoolingStateLabel(cooling)} / 状态 ${(cooling && cooling.status) || '—'}`, 'ok');
}
async function sendReagentCooling(targetDeciC, isEnabled, actionLabel) {
  // POST 响应自带最新 state.cooling，写入后无需再发一次 GET
  const resp = await backendApi('/api/thermal/cooling', {
    method: 'POST',
    body: JSON.stringify({
      commandId: makeCommandId('reagent-cooling'),
      targetTemperatureDeciC: Math.round(targetDeciC),
      isEnabled: !!isEnabled
    })
  });
  log(`${actionLabel}成功：目标 ${(targetDeciC / 10).toFixed(1)}℃ / 制冷 ${isEnabled ? '开启' : '关闭'}`, 'ok');
  // 写入成功后刷新 SVG/KPI 与两个文本框（同样先快照后覆写，保证公式最终生效）
  if(typeof loadDatabaseSnapshot === 'function') { try { await loadDatabaseSnapshot(); } catch(_) {} }
  const cooling = (resp && resp.state && resp.state.cooling) || null;
  applyReagentCoolingInputs(cooling);
  updateReagentCoolingSummary(cooling);
}
const REAGENT_COOLING_ACTIONS = new Set(['设置试剂制冷温度', '查询试剂制冷温度', '启动试剂制冷', '停止试剂制冷']);
function bindReagentCoolingControls(root = document) {
  const REAGENT_TEMP_MIN_C = -20, REAGENT_TEMP_MAX_C = 40;
  if(!root || typeof root.querySelectorAll !== 'function') return;
  root.querySelectorAll('[data-object-action]').forEach(btn => {
    const action = btn.getAttribute('data-object-action') || '';
    if(!REAGENT_COOLING_ACTIONS.has(action)) return;          // 仅接管试剂制冷这四个按钮，其余仍由 bindGenericObjectActionButtons 走模拟日志
    if(btn.dataset.objectActionBound === 'true') return;
    btn.dataset.objectActionBound = 'true';
    btn.addEventListener('click', async () => {
      flashControl(btn);
      try {
        if(action === '查询试剂制冷温度') { await queryReagentCooling(); return; }
        // 设置/启动/停止：都从目标温度输入框取值并做范围校验
        const targetInput = document.getElementById('reagentCoolingTargetInput');
        const celsius = parseReagentTempCelsius(targetInput ? targetInput.value : '');
        if(!Number.isFinite(celsius)) {
          log('试剂制冷控制：目标温度解析失败，请输入有效数字（例如 8 或 8.0℃）', 'warn');
          return;
        }
        if(celsius < REAGENT_TEMP_MIN_C || celsius > REAGENT_TEMP_MAX_C) {
          log(`试剂制冷控制：目标温度 ${celsius}℃ 超出允许范围 ${REAGENT_TEMP_MIN_C}~${REAGENT_TEMP_MAX_C}℃`, 'warn');
          return;
        }
        const targetDeciC = Math.round(celsius * 10);
        if(action === '设置试剂制冷温度') {
          // 设置目标温度时不改变当前启停状态：先读后端 isEnabled，再下发
          const cooling = await fetchReagentCoolingState();
          await sendReagentCooling(targetDeciC, !!(cooling && cooling.isEnabled), '设置试剂制冷温度');
        } else if(action === '启动试剂制冷') {
          await sendReagentCooling(targetDeciC, true, '启动试剂制冷');
        } else if(action === '停止试剂制冷') {
          await sendReagentCooling(targetDeciC, false, '停止试剂制冷');
        }
      } catch(err) {
        handleReagentCoolingError(err);
      }
    });
  });
}

// ===== 供水孔 / 供水模块控制：对象详情按钮对接后端 water-supply API（不再走通用模拟日志） =====
// 业务语义独立于 /api/fluidics/wash：每个供水孔有自己的温/流/量/开关状态。
const WATER_TEMP_MIN_C = 0, WATER_TEMP_MAX_C = 100;
const WATER_FLOW_MIN = 0, WATER_FLOW_MAX = 5000;
const WATER_SUPPLY_QUERY_ACTIONS = new Set(['查询进水温度','查询出水温度','查询出水目标温度','查询出水水量','查询出水流速']);
function parseWaterCelsius(raw) {
  const match = raw == null ? null : String(raw).trim().match(/-?\d+(\.\d+)?/);
  return match ? Number(match[0]) : NaN;
}
function formatWaterCelsius(deciC) {
  const v = Number(deciC);
  return Number.isFinite(v) ? (v / 10).toFixed(1) + '℃' : '—';
}
function parseWaterFlowMl(raw) {
  const match = raw == null ? null : String(raw).trim().match(/\d+(\.\d+)?/);
  return match ? Number(match[0]) : NaN;
}
function formatWaterFlowMl(mlPerMin) {
  const v = Number(mlPerMin);
  return Number.isFinite(v) ? v + 'mL/min' : '—';
}
function formatWaterVolumeMl(ml) {
  const v = Number(ml);
  return Number.isFinite(v) ? v + 'mL' : '—';
}
async function fetchWaterSupplyChannel(channelId) {
  return await backendApi(`/api/water-supply/channels/${channelId}`);
}
function applyWaterSupplyInputs(channelId, ch) {
  if(!ch) return;
  const inlet = document.getElementById(`waterChannel${channelId}InletTempInput`);
  const target = document.getElementById(`waterChannel${channelId}OutletTargetTempInput`);
  const outlet = document.getElementById(`waterChannel${channelId}OutletTempInput`);
  const volume = document.getElementById(`waterChannel${channelId}OutletVolumeInput`);
  const flow = document.getElementById(`waterChannel${channelId}OutletFlowInput`);
  const sw = document.getElementById(`waterChannel${channelId}OutletSwitchSelect`);
  if(inlet) inlet.value = formatWaterCelsius(ch.inletTemperatureDeciC);
  if(target) target.value = formatWaterCelsius(ch.outletTargetTemperatureDeciC);
  if(outlet) outlet.value = formatWaterCelsius(ch.outletTemperatureDeciC);
  if(volume) volume.value = formatWaterVolumeMl(ch.outletVolumeMl);
  if(flow) flow.value = formatWaterFlowMl(ch.outletFlowRateMlPerMinute);
  if(sw) sw.value = ch.outletEnabled ? '打开' : '关闭';
}
function handleWaterSupplyError(err) {
  if(err && err.status === 401) { routeWriteError(err); return; }
  log('供水孔控制失败：' + ((err && err.message) || '未知错误'), 'err');
  routeWriteError(err);
}
async function refreshWaterSupplyAfterWrite(channelId) {
  // 先刷 DB 快照（SVG/KPI/标量），再用 water-supply 通道详情覆写输入框，避免快照覆盖刚写入的值
  if(typeof loadDatabaseSnapshot === 'function') { try { await loadDatabaseSnapshot(); } catch(_) {} }
  applyWaterSupplyInputs(channelId, await fetchWaterSupplyChannel(channelId));
}
function bindWaterSupplyControls(box, channelId) {
  if(!box || typeof box.querySelectorAll !== 'function') return;
  // 进入详情页自动回填一次（GET /api/water-supply/channels/{channelId}）
  fetchWaterSupplyChannel(channelId).then(ch => applyWaterSupplyInputs(channelId, ch)).catch(handleWaterSupplyError);
  box.querySelectorAll('[data-object-action]').forEach(btn => {
    const action = btn.getAttribute('data-object-action') || '';
    if(btn.dataset.objectActionBound === 'true') return;
    btn.dataset.objectActionBound = 'true';
    btn.addEventListener('click', async () => {
      flashControl(btn);
      try {
        if(WATER_SUPPLY_QUERY_ACTIONS.has(action)) {
          const ch = await fetchWaterSupplyChannel(channelId);
          await refreshWaterSupplyAfterWrite(channelId); // 含 loadDatabaseSnapshot + 回填
          const seg = {
            '查询进水温度': () => `进水温度 ${formatWaterCelsius(ch.inletTemperatureDeciC)}`,
            '查询出水温度': () => `出水温度 ${formatWaterCelsius(ch.outletTemperatureDeciC)}`,
            '查询出水目标温度': () => `出水目标温度 ${formatWaterCelsius(ch.outletTargetTemperatureDeciC)}`,
            '查询出水水量': () => `出水水量 ${formatWaterVolumeMl(ch.outletVolumeMl)}`,
            '查询出水流速': () => `出水流速 ${formatWaterFlowMl(ch.outletFlowRateMlPerMinute)}`
          }[action]?.() || '';
          log(`通道${channelId}供水孔查询：${seg} / 开关 ${ch.outletEnabled ? '打开' : '关闭'} / 状态 ${ch.status || '—'}`, 'ok', channelId);
          return;
        }
        if(action === '设置出水目标温度') {
          const input = document.getElementById(`waterChannel${channelId}OutletTargetTempInput`);
          const celsius = parseWaterCelsius(input ? input.value : '');
          if(!Number.isFinite(celsius) || celsius < WATER_TEMP_MIN_C || celsius > WATER_TEMP_MAX_C) {
            log(`供水孔：目标温度解析失败或超出 ${WATER_TEMP_MIN_C}~${WATER_TEMP_MAX_C}℃`, 'warn'); return;
          }
          await backendApi(`/api/water-supply/channels/${channelId}/target-temperature`, {
            method: 'POST',
            body: JSON.stringify({ commandId: makeCommandId('water-target'), targetTemperatureDeciC: Math.round(celsius * 10), reason: `前端设置通道${channelId}出水目标温度` })
          });
          log(`通道${channelId}供水孔目标温度已设置：${celsius.toFixed(1)}℃`, 'ok', channelId);
          await refreshWaterSupplyAfterWrite(channelId);
          return;
        }
        if(action === '设置出水流速') {
          const input = document.getElementById(`waterChannel${channelId}OutletFlowInput`);
          const flow = parseWaterFlowMl(input ? input.value : '');
          if(!Number.isFinite(flow) || flow < WATER_FLOW_MIN || flow > WATER_FLOW_MAX) {

          });
          log(`通道${channelId}供水孔流速已设置：${flow}mL/min`, 'ok', channelId);
          await refreshWaterSupplyAfterWrite(channelId);
          return;
        }
        if(action === '切换出水开关') {
          const sw = document.getElementById(`waterChannel${channelId}OutletSwitchSelect`);
          const enable = !(sw && sw.value === '打开');
          await backendApi(`/api/water-supply/channels/${channelId}/outlet`, {
            method: 'POST',
            body: JSON.stringify({ commandId: makeCommandId('water-outlet'), enabled: enable, reason: `前端${enable ? '打开' : '关闭'}通道${channelId}出水开关` })
          });
          log(`通道${channelId}供水孔出水开关已${enable ? '打开' : '关闭'}`, 'ok', channelId);
          await refreshWaterSupplyAfterWrite(channelId);
          return;
        }
      } catch(err) { handleWaterSupplyError(err); }
    });
  });
}

  const arr = slideOps.get(slideName) || Array.from({length:len}, () => false);

function drawPath() {

  const runtimeSteps = Array.isArray(runtimeState?.steps) ? runtimeState.steps : [];

  const targets = routeSteps.map(s => runtimeSteps.length ? runtimeStepTarget(s) : (s.target ? findTarget(s.target) : null));
  const indexedTargets = targets.map((target, index) => ({ target, index })).filter(x => x.target);
  const pts = indexedTargets.map(x => mmToPx(x.target.x, x.target.y));
  if(pts.length < 2) return;
  const rawCursor = runtimeSteps.length && runtimeState?.currentStep?.id
    ? runtimeSteps.findIndex(s => s.id === runtimeState.currentStep.id)
    : currentStepIndex;
  const currentRouteIndex = indexedTargets.findIndex(x => x.index >= Math.max(0, rawCursor));
  const cursor = Math.max(0, Math.min(currentRouteIndex < 0 ? pts.length - 1 : currentRouteIndex, pts.length - 1));
  const startSeg = Math.max(0, cursor - 3);
  const endSeg = Math.min(pts.length - 2, cursor + 2);
  for(let i = startSeg; i <= endSeg; i++) {
    const cls = i < cursor ? 'path-segment path-past' : 'path-segment path-future';
    const p1 = pts[i], p2 = pts[i+1];
    pathLayer.appendChild(el('line', { id:`svg-runtime-path-segment-${i + 1}`, 'data-control-id':`svg-runtime-path-segment-${i + 1}`, x1:p1[0], y1:p1[1], x2:p2[0], y2:p2[1], class:cls }));
  }
}

    const rrow = reagentRowByCode(reagentCode);

  const pointSlot = pointCode.toUpperCase().match(/^([A-D])-(0?[1-4])$/);

async function applyScannerRoi(baseId, scannerType) {
  const num = id => { const v = Number(document.getElementById(`${baseId}-barcode-roi-${id}`)?.value); return Number.isFinite(v) ? v : 0; };
  const L = num('left'), T = num('top'), W = num('width'), H = num('height');
  const sc = await resolveScannerId(scannerType);
  if(!sc) { log(`[ROI保存] 没有扫码器，未写入（left=${L} top=${T} w=${W} h=${H}）`, 'warn'); return; }
  const sid = encodeURIComponent(sc.id);
  // 1) 应用到硬件（DCR55 指令）
  await writeApi(`/api/scanners/${sid}/roi/apply`, { method:'POST', body: JSON.stringify({ commandId: makeCommandId('scanner-roi'), left: L, top: T, width: W, height: H, reason: `twin ROI 保存 (${scannerType})` }) });
  // 2) 持久化到 profile（GET 全量 → 改 deviceParameters.roi → PUT），否则切换页面后 ROI 会丢（与"配置/扫码器：设置ROI"一致）
  try {
    const cur = await backendApi(`/api/scanners/${sid}`);
    const dp = Object.assign({}, cur.deviceParameters || {}, { roiX: L, roiY: T, roiWidth: W, roiHeight: H });
    await writeApi(`/api/scanners/${sid}`, { method:'PUT', body: JSON.stringify({
      commandId: makeCommandId('scanner-roi-save'), name: cur.name, scannerType: cur.scannerType, enabled: cur.enabled !== false,
      port: cur.port, baudRate: cur.baudRate, timeoutMilliseconds: cur.timeoutMilliseconds ?? 2000, triggerMode: cur.triggerMode || 'Software',
      deviceParameters: dp, reason: '对象 ROI 保存(持久化)'
    }) });
  } catch(e) { /* routed by writeApi */ }
  log(`[ROI保存✓] 扫码器=${sc.name || sc.id} 写入 left=${L} top=${T} width=${W} height=${H}（已持久化到 profile）`, 'ok');
}

// 扫码器 profile 解析：按 Name 含「试剂/样本」匹配角色，找不到则取第一条；无任何 profile 返回 null。
async function resolveScannerId(role) {
  let list = [];
  try { list = await backendApi('/api/scanners'); } catch(e) { list = []; }
  if(!Array.isArray(list) || !list.length) return null;
  const wantReagent = role === 'reagent';
  const byRole = list.find(s => wantReagent ? /试剂/i.test(String(s.name || '')) : /样本/i.test(String(s.name || '')));
  return byRole || list[0]; // 指定类型(样本/试剂)没有时回退到第一个可用扫码器，避免"没有已配置的扫码器"误报
}

async function createScannerProfile() {

  const port = document.getElementById('scannerComPortSelect')?.value || 'COM1';
  const baud = Number(document.getElementById('scannerBaudRateSelect')?.value) || 115200;
  const roi = k => { const v = Number(document.getElementById('scannerRoi' + k + 'Input')?.value); return Number.isFinite(v) ? v : null; };
  await writeApi('/api/scanners', { method:'POST', body: JSON.stringify({
    commandId: makeCommandId('scanner-create'),
    name: role === 'reagent' ? '试剂扫码器' : '样本扫码器',
    scannerType: 'Dcr55',
    enabled: true,
    port,
    baudRate: baud,
    timeoutMilliseconds: 2000,
    triggerMode: 'Software',
    deviceParameters: { roiX: roi('Left'), roiY: roi('Top'), roiWidth: roi('Width'), roiHeight: roi('Height') },
    reason: 'twin 创建扫码器'
  }) });
  log(`已创建扫码器配置：${role === 'reagent' ? '试剂扫码器' : '样本扫码器'}（ScannerType=Dcr55, TriggerMode=Software）`, 'ok');
  await loadDatabaseSnapshot();
}

async function scannerControl(action) {
  const role = String(document.getElementById('scannerTargetSelect')?.value || 'reagent');
  const sc = await resolveScannerId(role);
  if(!sc) { log('没有已配置的扫码器，请先「创建扫码器」', 'warn'); return; }
  const id = encodeURIComponent(sc.id);
  if(action === '配置/扫码器：读取条码') {
    const res = await writeApi(`/api/scanners/${id}/barcode/read`, { method:'POST', body: JSON.stringify({ commandId: makeCommandId('scanner-barcode'), reason: 'twin 读取条码' }) });
    const barcode = String((res?.steps?.[0]?.responseText) || '').trim();
    const el = document.getElementById('scannerBarcodeReadInput');
    if(el) el.value = barcode;
    log(`读取条码：${barcode || '(空——Mock 无真实扫码返回)'}`, barcode ? 'ok' : 'warn');
    await loadDatabaseSnapshot();
    return;
  }
  if(action === '配置/扫码器：设置ROI') {
    const roi = k => { const v = Number(document.getElementById('scannerRoi' + k + 'Input')?.value); return Number.isFinite(v) ? v : 0; };
    const L = roi('Left'), T = roi('Top'), W = roi('Width'), H = roi('Height');
    if(L < 0 || T < 0 || W <= 0 || H <= 0) { log('请先填写完整 ROI（左/上≥0，宽/高>0）', 'warn'); return; }
    // 1) 应用到硬件（DCR55 CDOPSR* 指令）
    await writeApi(`/api/scanners/${id}/roi/apply`, { method:'POST', body: JSON.stringify({ commandId: makeCommandId('scanner-roi'), left: L, top: T, width: W, height: H, reason: 'twin 设置ROI' }) });
    // 2) 持久化到 profile 配置（GET 全量 → 改 deviceParameters.roi → PUT），否则切换页面后 ROI 会丢
    try {
      const cur = await backendApi(`/api/scanners/${id}`);
      const dp = Object.assign({}, cur.deviceParameters || {}, { roiX: L, roiY: T, roiWidth: W, roiHeight: H });
      await writeApi(`/api/scanners/${id}`, { method:'PUT', body: JSON.stringify({
        commandId: makeCommandId('scanner-roi-save'), name: cur.name, scannerType: cur.scannerType, enabled: cur.enabled !== false,
        port: cur.port, baudRate: cur.baudRate, timeoutMilliseconds: cur.timeoutMilliseconds ?? 2000, triggerMode: cur.triggerMode || 'Software',
        deviceParameters: dp, reason: 'twin 设置ROI(保存)'
      }) });
    } catch(e) { /* routed by writeApi */ }
  } else if(action === '配置/扫码器：打开校验光') {
    await writeApi(`/api/scanners/${id}/calibration-light/enable`, { method:'POST', body: JSON.stringify({ commandId: makeCommandId('scanner-light-on'), reason: 'twin 打开校验光' }) });
  } else if(action === '配置/扫码器：关闭校验光') {
    await writeApi(`/api/scanners/${id}/calibration-light/disable`, { method:'POST', body: JSON.stringify({ commandId: makeCommandId('scanner-light-off'), reason: 'twin 关闭校验光' }) });
  } else if(action === '配置/扫码器：重新启动') {
    await writeApi(`/api/scanners/${id}/restart`, { method:'POST', body: JSON.stringify({ commandId: makeCommandId('scanner-restart'), reason: 'twin 重启扫码器' }) });
  } else if(action === '配置/扫码器：激活单次触发') {
    await writeApi(`/api/scanners/${id}/trigger`, { method:'POST', body: JSON.stringify({ commandId: makeCommandId('scanner-trigger-single'), mode: 'single', reason: 'twin 激活单次触发' }) });
  } else if(action === '配置/扫码器：激活连续触发') {
    await writeApi(`/api/scanners/${id}/trigger`, { method:'POST', body: JSON.stringify({ commandId: makeCommandId('scanner-trigger-continuous'), mode: 'continuous', reason: 'twin 激活连续触发' }) });
  } else if(action === '配置/扫码器：停止单次触发' || action === '配置/扫码器：停止连续触发') {
    await writeApi(`/api/scanners/${id}/trigger`, { method:'POST', body: JSON.stringify({ commandId: makeCommandId('scanner-trigger-stop'), mode: 'stop', reason: 'twin 停止触发' }) });
  }
  log(`${action} -> 扫码器 ${sc.name || sc.id} 已下发`, 'ok');
  await loadDatabaseSnapshot();
}

// 把已保存的扫码器配置（COM + ROI）静默回填到输入框。切换子页回来时由 bindConfigHandlers 自动调用，避免值"丢失"。
async function loadScannerConfigIntoInputs() {
  const role = String(document.getElementById('scannerTargetSelect')?.value || 'reagent');

  setVal('scannerComPortSelect', p.port);

  setVal('scannerRoiTopInput', dp.roiY);
  setVal('scannerRoiWidthInput', dp.roiWidth);

// 对象化工程动作统一分发器。按 action + item.category 路由到真实后端命令。
async function dispatchObjectAction(action, item, baseId, btn) {
  if(btn) flashControl(btn);
  const name = item?.name || '';
  const isReagent = item?.category === '试剂区';
  try {
    if(isReagent) {
      const rackCode = reagentRackCodeFromItem(item);
      if(action === '开始试剂条码扫描') return await reagentPositionScan(rackCode, 'scan', name);
      if(action === '停止试剂条码扫描') return await reagentPositionScan(rackCode, 'stop', name);
      if(action === '清空试剂条码') return await reagentPositionScan(rackCode, 'clear', name);
    }
    if(action === '保存ROI到扫码器和配置文件') { if(isReagent) return await saveReagentPositionConfig(item, baseId, `${baseId}-barcode-x`, `${baseId}-barcode-y`); return await applyScannerRoi(baseId, 'sample'); }
    if(action === '保存孔位参数') return await saveReagentPositionConfig(item, baseId, `${baseId}-coord-x`, `${baseId}-coord-y`);
    if(action === '保存扫码XY坐标到配置文件') return await saveReagentPositionConfig(item, baseId, `${baseId}-barcode-x`, `${baseId}-barcode-y`);
    if(PIPETTE_ACTIONS[action]) return await runPipetteTest(action, item, baseId);
    if(action === '停止动作') { log('停止动作：Mock 模式无独立停止端点，设备随工程会话结束停止', 'warn'); return; }
    log(`${action}：${name} 暂未接入后端（模拟队列）`, 'warn');
  } catch(err) { /* routed by writeApi where used */ }
}
// 对象孔位参数（X/Y + Z 高度）一次校正入库：复用 /api/engineering/coordinate-points/calibrate。
// X/Y 取指定输入（坐标修正框 或 扫码XY框），Z 取孔位编辑器四个 Z 输入；同一草稿版本写入，不互相覆盖。
async function calibrateObjectPoint(item, baseId, xInputId, yInputId) {
  const dbPoint = itemToPointCode(item);
  if(!dbPoint) { log(`${item?.name || ''} 无对应后端坐标点，无法校正`, 'warn'); return; }
  const profile = await resolveActiveCoordinateProfile();
  if(!profile?.code) { log(`未找到活动坐标档案，无法校正：${item?.name || ''}`, 'warn'); return; }
  const mm = id => { const v = Number(document.getElementById(id)?.value); return Number.isFinite(v) ? positionMmToUm(v) : null; };
  const xUm = mm(xInputId), yUm = mm(yInputId);
  const zTravel = mm(`${baseId}-z-travel`), zStart = mm(`${baseId}-z-start`), zEnd = mm(`${baseId}-z-end`), zDispense = mm(`${baseId}-z-dispens`);
  log(`[孔位保存] ${item.name}(→${dbPoint}) 即将写入(µm) X=${xUm} Y=${yUm} safeZ=${zTravel} aspirateZ=${zStart} aspirateEndZ=${zEnd} dispenseZ=${zDispense}`, 'info');
  if(!(await ensureModuleEngineeringSession(`coordinate-calibrate:${dbPoint}`, `对象孔位参数 ${item.name}`))) return;
  await writeApi('/api/engineering/coordinate-points/calibrate', { method:'POST', body: JSON.stringify({
    commandId: makeCommandId('coord-correct'),
    profileCode: profile.code,
    pointCode: dbPoint,
    calibratedXUm: xUm, calibratedYUm: yUm,
    safeZUm: zTravel, aspirateZUm: zStart, aspirateEndZUm: zEnd, dispenseZUm: zDispense,
    reason: `对象孔位参数 ${item.name}→${dbPoint}`,
    dangerousOperationConfirmed: true
  }) });
  invalidateCoordinateProfilesCache(); // 失效缓存，让下面 activate 能读到刚建的草稿
  objectCoordCache.set(dbPoint, { xUm, yUm, zTravel, zStart, zEnd, zDispense });
  const activated = await activateLatestCoordinateDraft();
  log(`[孔位保存✓] ${item.name}(→${dbPoint}) 已写入(µm) X=${xUm} Y=${yUm} safeZ=${zTravel} aspirateZ=${zStart} aspirateEndZ=${zEnd} dispenseZ=${zDispense}${activated ? '（已自动发布+启用）' : '（已落草稿，auto-启用失败）'}`, activated ? 'ok' : 'warn');
  await loadDatabaseSnapshot();
  await loadObjectCoordinates(item, baseId);
}

// 校正后把最新草稿 publish+activate，使其进入活动 coordinate_points（机械臂即用、界面回看可见）。
async function activateLatestCoordinateDraft() {
  try {
    const list = await fetchCoordinateProfiles();
    const arr = Array.isArray(list) ? list : [];
    const prof = arr.find(p => p && p.isActive) || arr[0];
    const allVers = prof?.versions || [];
    const vers = allVers.filter(v => v && v.status === 'Draft');
    if(!vers.length) { log(`坐标自动启用跳过：未找到 Draft 版本（总版本数=${allVers.length}）`, 'warn'); return false; }
    const newest = vers.slice().sort((a,b) => (Number(b.versionNo)||0) - (Number(a.versionNo)||0))[0];
    if(!newest?.id) { log('坐标自动启用跳过：Draft 版本无 id', 'warn'); return false; }
    await writeApi(`/api/engineering/coordinate-profile-versions/${encodeURIComponent(newest.id)}/publish`, { method:'POST', body: JSON.stringify({ commandId: makeCommandId('coord-publish'), reason: '对象坐标校正后自动发布', validationResultJson: newest.validationResultJson || '{"status":"PointCalibrated"}', target: `coordinate-version:${newest.id}`, dangerousOperationConfirmed: true }) });
    await writeApi(`/api/engineering/coordinate-profile-versions/${encodeURIComponent(newest.id)}/activate`, { method:'POST', body: JSON.stringify({ commandId: makeCommandId('coord-activate'), reason: '对象坐标校正后自动启用', target: `coordinate-version:${newest.id}`, dangerousOperationConfirmed: true }) });
    return true;
  } catch(e) { log('坐标自动启用失败：' + (e?.data?.detail || e?.data?.code || e?.message || e), 'warn'); return false; }
}
// 打开对象详情时：从活动坐标档案读回该点 X/Y + Z，回填 坐标修正/孔位/扫码XY 输入框（保存后再回来还在）。
const objectCoordCache = new Map(); // dbPoint → {xUm,yUm,zTravel,zStart,zEnd,zDispense}：保存后即时回填，切换回来不等 GET
async function loadObjectCoordinates(item, baseId) {
  const dbPoint = itemToPointCode(item);
  if(!dbPoint) return;
  const setMm = (id, um) => { const mm = positionUmToMm(um); const el = document.getElementById(id); if(el && mm !== null) el.value = mm; };
  const apply = (xUm, yUm, zTravel, zStart, zEnd, zDispense) => {
    setMm(`${baseId}-coord-x`, xUm); setMm(`${baseId}-coord-y`, yUm);
    setMm(`${baseId}-barcode-x`, xUm); setMm(`${baseId}-barcode-y`, yUm);
    setMm(`${baseId}-z-travel`, zTravel); setMm(`${baseId}-z-start`, zStart);
    setMm(`${baseId}-z-end`, zEnd); setMm(`${baseId}-z-dispens`, zDispense);
  };
  // 1) 先用缓存即时回填（保存后切回立即显示，和调试/配置模块一样"改过就不变"）
  const cached = objectCoordCache.get(dbPoint);
  if(cached) apply(cached.xUm, cached.yUm, cached.zTravel, cached.zStart, cached.zEnd, cached.zDispense);
  // 2) 再从后端读取刷新（活动版本或最新草稿）
  try {
    const profile = await resolveActiveCoordinateProfile();
    if(!profile) return;
    const hasCalib = p => p && (p.calibratedXUm != null || p.safeZUm != null || p.aspirateZUm != null || p.dispenseZUm != null);
    let pt = (Array.isArray(profile.points) ? profile.points : []).find(p => p && p.pointCode === dbPoint && hasCalib(p)) || null;
    let src = pt ? '活动版本' : '';
    if(!pt) {
      const versions = (profile.versions || []).slice().sort((a,b) => (Number(b.versionNo)||0) - (Number(a.versionNo)||0));
      for(const v of versions) {
        const p = (v.targetPoints || []).find(x => x && x.pointCode === dbPoint && hasCalib(x));
        if(p) { pt = p; src = `草稿版本(${v.versionLabel})`; break; }
      }
    }
    if(!pt) { if(!cached) log(`[坐标回读] ${item.name}(→${dbPoint}) 未找到校正值，保持默认`, 'info'); return; }
    apply(pt.calibratedXUm, pt.calibratedYUm, pt.safeZUm, pt.aspirateZUm, pt.aspirateEndZUm, pt.dispenseZUm);
    objectCoordCache.set(dbPoint, { xUm: pt.calibratedXUm, yUm: pt.calibratedYUm, zTravel: pt.safeZUm, zStart: pt.aspirateZUm, zEnd: pt.aspirateEndZUm, zDispense: pt.dispenseZUm });
    log(`[坐标回读✓] ${item.name}(→${dbPoint}) 从${src}读到 X=${positionUmToMm(pt.calibratedXUm)} Y=${positionUmToMm(pt.calibratedYUm)} safeZ=${positionUmToMm(pt.safeZUm)} aspirateZ=${positionUmToMm(pt.aspirateZUm)} dispenseZ=${positionUmToMm(pt.dispenseZUm)}`, 'ok');
  } catch(e) { log(`[坐标回读] 异常：${e?.message||e}`, 'warn'); }
}

async function ensureReagentScanSession() {
  const overview = await backendApi('/api/reagents/scan-sessions/overview');
  if(overview?.activeSession?.scanSessionId) return overview.activeSession.scanSessionId;
  const started = await writeApi('/api/reagents/scan-sessions/start', { method:'POST', body: JSON.stringify({ commandId: makeCommandId('reagent-scan-start') }) });

  try {

// twin 试剂位命名为 试剂_S<col><row>（col=通道1-5, row=瓶位1-8）；后端 ReagentRackPosition.Code 为
// 列主序 R{positionNo}，positionNo=(col-1)*8+row（实测 R1=col1row1, R8=col1row8, R9=col2row1, R40=col5row8）。
function reagentRackCodeFromItem(item) {
  const col = Number(item?.col), row = Number(item?.row);
  if(Number.isFinite(col) && Number.isFinite(row) && col >= 1 && col <= 5 && row >= 1 && row <= 8) return `R${(col - 1) * 8 + row}`;
  const m = /S\s*(\d)\s*(\d)/i.exec(String(item?.name || ''));
  if(m) return `R${(Number(m[1]) - 1) * 8 + Number(m[2])}`;
  return String(item?.name || '');
}

// 试剂位扫码：rackCode 形如 'R1'（后端 Code）。区分硬件扫码器控制(qr/*)与业务扫码会话(scan-confirm)。
// 硬件命令成功后不直接伪造试剂位状态，试剂位 UI 以 /api/reagents/rack 或 snapshot 为准。
async function reagentPositionScan(rackCode, mode, label) {
  const display = label || rackCode;
  try {
    const scanSessionId = await ensureReagentScanSession();
    if(!scanSessionId) { log('未能建立试剂扫码会话', 'err'); return; }
    const qrAction = mode === 'stop' ? 'reset' : (mode === 'clear' ? 'clear' : 'start'); // 后端无 /qr/stop；停止=复位(reset)
    await writeApi(`/api/device/reagent-scanner/qr/${qrAction}`, { method:'POST', body: JSON.stringify({ commandId: makeCommandId('reagent-qr-' + qrAction), position: rackCode, scanSessionId }) });
    if(mode === 'scan') {
      // 默认条码按"试剂位"唯一生成（试剂码按 8 位循环 + 序列号=孔位号），避免多次扫码复用同一瓶子导致旧位被清空。
      const _posNum = parseInt(String(rackCode).replace(/\D/g, '')) || 1;
      const _defRc = ['ACD','BLK','EOS','ETH','HEM','P01','SEC','WAS'][(_posNum - 1) % 8] || 'HEM';
      const _defBarcode = `${_defRc}08020260722${String(_posNum).padStart(3, '0')}`;
      const rawBarcode = String(prompt(`试剂位 ${display} (${rackCode})：输入扫描到的条码（Mock，须 17 位：试剂码3+数量3+批号8+序列号3）`, _defBarcode) || '').trim();
      if(!rawBarcode) { log(`试剂位 ${display} (${rackCode}) 扫码已取消`, 'warn'); return; }
      await writeApi('/api/device/reagent-scanner/qr/report', { method:'POST', body: JSON.stringify({ commandId: makeCommandId('reagent-qr-report'), position: rackCode, scanSessionId, text: rawBarcode }) });
      await writeApi('/api/reagents/scan-confirm', { method:'POST', body: JSON.stringify({
        commandId: makeCommandId('reagent-scan-confirm'),
        scanSessionId,
        items: [{ position: rackCode, scanResult: 'VALID', rawBarcode, locatorCode: rackCode }]
      }) });
      log(`试剂位 ${display} (${rackCode}) 扫码并确认完成`, 'ok');
    } else if(mode === 'stop') {
      log(`试剂位 ${display} (${rackCode}) 扫描已停止`, 'ok');
    } else {
      log(`试剂位 ${display} (${rackCode}) 条码已清空（硬件）`, 'ok');
    }
    await loadDatabaseSnapshot();
  } catch(err) { /* routed by writeApi */ }
}

function bindObjectEngineeringDetail(item, baseId) {
  const objectRoot = document.getElementById(`${baseId}-object-engineering`);
  if(!objectRoot) return;
  objectRoot.querySelectorAll('[data-object-action]').forEach(btn => {
    if(btn.dataset.objectActionBound === 'true') return;
    btn.dataset.objectActionBound = 'true';
    btn.addEventListener('click', () => {
      const action = btn.getAttribute('data-object-action') || btn.textContent.trim();
      dispatchObjectAction(action, item, baseId, btn);
    });
  });
  // 对象化移液测试的液体类型下拉：复用液体类型缓存填充（吸液/打液需要 LiquidClass）。
  const lcEl = document.getElementById(`${baseId}-pipette-liquid-class`);
  if(lcEl && !lcEl.dataset.liquidClassBound) { lcEl.dataset.liquidClassBound = 'true'; refreshLiquidClassOptionsCache().then(() => rebuildLiquidClassSelect(lcEl, currentLiquidClassCode)); }
  // 打开对象详情时回填已存的坐标(X/Y+Z)与扫码器 ROI（保存后再回来还在）。
  loadReagentPositionConfig(item, baseId);
  if(item.category === '试剂区' || item.category === '玻片通道') {
    if(item.category === '玻片通道') loadObjectScannerRoi(baseId, 'sample'); // 试剂区 ROI 已由 loadReagentPositionConfig 处理（每试剂位独立）
  }
}

function log(message, type='', channelHint=null) {
  const now = new Date();
  const text = `[${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}] #${++logSerial} ${message}`;
  const logList = document.getElementById('logList');
  if(logList) {
    const p = document.createElement('p');
    const channel = channelHint ? String(channelHint) : inferLogChannel(message);
    p.id = `logEntry${logSerial}`; p.dataset.controlId = p.id; p.dataset.channel = channel; p.className = type; p.textContent = text;
    logList.prepend(p);
    while(logList.children.length > 80) logList.removeChild(logList.lastChild);
    applyLogFilter();
  }
  if(type === 'warn' || type === 'err') {
    warningCount += 1;
    const counter = document.getElementById('warnTabCount');
    if(counter) counter.textContent = warningCount;
    const panelCounter = document.getElementById('warnPanelCount');
    if(panelCounter) panelCounter.textContent = warningCount;
    const warnList = document.getElementById('warnList');
    if(warnList) {
      const wp = document.createElement('p');
      const warnChannel = channelHint ? String(channelHint) : inferLogChannel(message);
      wp.id = `warnEntry${warningCount}`; wp.dataset.controlId = wp.id; wp.dataset.channel = warnChannel; wp.className = type; wp.textContent = text;
      warnList.prepend(wp);
      while(warnList.children.length > 80) warnList.removeChild(warnList.lastChild);
      applyWarnFilter();
    }
  }
}

function mapCheckStatus(status) {
  switch(status) {
    case 'Passed': return 'pass';
    case 'Failed': return 'error';
    case 'Unavailable': return 'unavailable';
    case 'Running': return 'running';
    default: return 'error'; // 未知状态一律视为异常，绝不默认通过
  }
}
function localizePreflightIssue(issue) {
  const areaNames = {
    Device:'设备', Thermal:'温控', Fluidics:'流体系统', Motion:'运动系统',
    Tasks:'任务', Workflow:'流程', Reagents:'试剂'
  };
  const code = String(issue?.code || '');
  const raw = String(issue?.message || '未知错误');
  const channel = raw.match(/Channel\s+([^\s.]+)/i)?.[1] || '';
  const task = raw.match(/Task\s+([^\s.]+)/i)?.[1] || '';
  const count = raw.match(/(?:has|contains)\s+(\d+)/i)?.[1] || '';
  const tail = raw.match(/:\s*([^.]*)\.?$/)?.[1] || '';
  const messages = {
    device_initialization_required:`当前模式的设备初始化尚未就绪（状态：${raw.match(/Status=([^.]*)/i)?.[1] || '失败'}）。`,
    no_confirmed_tasks:'没有已确认的染色任务。',
    channel_batch_required:`任务 ${task} 尚未分配到通道批次。`,
    channel_batch_needs_manual_resolution:`通道 ${channel} 需要人工确认流程。`,
    channel_workflow_required:`通道 ${channel} 尚未选择流程。`,
    drawer_batch_size_invalid:`通道 ${channel} 必须包含 1～4 张玻片。`,
    channel_experiment_type_mismatch:`通道 ${channel} 的玻片或流程类型与实验类型不一致。`,
    channel_workflow_mismatch:`通道 ${channel} 的玻片流程与通道流程不一致。`,
    primary_antibody_required:`通道 ${channel} 有 ${count || '部分'} 张 IHC 玻片未设置一抗编码。`,
    channel_workflow_incompatible:`通道 ${channel} 存在不兼容的一抗编码：${tail}。`,
    workflow_version_missing:`通道 ${channel} 的流程版本不存在。`,
    workflow_version_not_published:`通道 ${channel} 的流程版本尚未发布。`,
    scan_missing:'尚未完成试剂扫码确认。',
    scan_has_invalid_items:`最近一次试剂扫码包含 ${count || '若干'} 个无效项目。`,
    scan_has_unscanned_positions:`最近一次试剂扫码仍有 ${count || '若干'} 个位置未扫描。`,
    required_reagent_missing:`缺少必需试剂：${tail}。`,
    required_reagent_expired:`必需试剂已过期：${tail}。`,
    required_reagent_insufficient:`必需试剂余量不足：${tail}。`,
    mixer_running:'混匀器正在运行。'
  };
  let message = messages[code] || raw;
  message = message
    .replace(/Mixer\s+([A-D])\s+is running; fault=none\.?/gi, '混匀器 $1 正在运行，无故障。')
    .replace(/Device initialization is not ready for the current mode\. Status=([^.]*)\.?/gi, '当前模式的设备初始化尚未就绪（状态：$1）。');
  return `${areaNames[issue?.area] || issue?.area || '系统'}：${message}`;
}
function renderPrecheckList() {
  const wrap = document.getElementById('precheckList');
  const runAllBtn = document.getElementById('precheckRunAllBtn');
  if(runAllBtn) { runAllBtn.disabled = precheckRunning; runAllBtn.onclick = runPrecheck; }
  if(!wrap) return;
  const statusLabel = { idle:'待检查', running:'检查中', pass:'通过', error:'异常', unavailable:'不可用' };
  wrap.innerHTML = PRECHECK_STEPS.map((step, idx) => {
    const state = precheckState[step.id] || 'idle';
    const stepId = `precheckStep${idx + 1}`;
    return `<div class="precheck-step ${state}" id="${stepId}" data-control-id="${stepId}"><span class="precheck-dot" id="${stepId}StatusDot"></span><span class="precheck-main" id="${stepId}Content"><span class="precheck-name" id="${stepId}Name">${escapeHtml(step.label)}</span></span><span class="precheck-status" id="${stepId}StatusText">${statusLabel[state] || state}</span><button type="button" class="precheck-run-btn" id="${stepId}RunBtn" data-precheck-run="${escapeHtml(step.id)}" ${precheckRunning?'disabled':''}>检测</button></div>`;
  }).join('');
  document.querySelectorAll('[data-precheck-run]').forEach(btn => { btn.onclick = () => runSinglePrecheck(btn.dataset.precheckRun); });
}
function applyPrecheckChecks(checks) {
  // 按 checkId 映射后端真实结果；缺失/未知一律异常，绝不默认通过。
  for(const step of PRECHECK_STEPS) precheckState[step.id] = 'error';
  precheckDetails = {};
  if(Array.isArray(checks)) {
    for(const check of checks) {
      if(check && PRECHECK_BY_ID[check.checkId]) {
        precheckState[check.checkId] = mapCheckStatus(check.status);
        precheckDetails[check.checkId] = check;
      }
    }
  }
}
async function refreshPreflightGate() {
  // 开始按钮最终只由最新 GET /api/run/preflight 的 canStart 决定。
  let preflight = null;
  try { preflight = await apiGetOrNull('/api/run/preflight'); } catch(e) { preflight = null; }
  const canStart = !!(preflight && preflight.canStart);
  precheckPassed = canStart;
  const settingsPreText = document.getElementById('settingsPrecheckText'); if(settingsPreText) settingsPreText.textContent = canStart ? '已通过' : '未完成';
  setButtonState('startBtn', { disabled:!canStart });
  return preflight;
}
function renderPrecheckResultPanel(preflight) {
  const allPassed = PRECHECK_STEPS.every(s => precheckState[s.id] === 'pass');
  const failedItems = PRECHECK_STEPS.filter(s => precheckState[s.id] !== 'pass').map(s => {
    const detail = precheckDetails[s.id];
    return detail?.message ? `${s.label}：${detail.message}` : s.label;
  });
  const failIssues = (preflight?.issues || []).filter(x => String(x.severity || 'Fail').toLowerCase() !== 'warning');
  if(allPassed && precheckPassed) {
    setInfoPanel('检测通过', ['11 项设备检查全部通过，运行条件齐备。', '现在可以点击顶部“开始”执行染色流程。']);
    log('检测通过：开始按钮已启用', 'ok');
  } else if(allPassed && !precheckPassed) {
    // 设备检查全通过，但业务条件未通过（Workflow/Tasks/Reagents 等）
    setInfoPanel('设备检查通过，运行条件未通过', failIssues.length ? failIssues.map(localizePreflightIssue) : ['后端运行前校验未通过，请处理后再开始。']);
    log(`检测完成：设备检查通过，但运行条件未通过（${failIssues.length} 项业务问题）`, 'err');
  } else {
    setInfoPanel('检测未通过', failedItems.length ? [`异常项：${failedItems.join('、')}`, '请处理异常后重新检测。'] : ['设备检查未通过，请处理异常后重新检测。']);
    log(`检测完成：共 ${failedItems.length} 项异常`, 'err');
  }
}
async function runSinglePrecheck(checkId) {
  const step = PRECHECK_BY_ID[checkId];
  if(precheckRunning || !step) return;
  precheckRunning = true;
  setButtonState('startBtn', { disabled:true });
  showSideTab('precheck');
  precheckState[step.id] = 'running';
  renderPrecheckList();
  log(`单项检测：${step.label}`, 'ok');
  let check = null;
  try {
    const report = await backendApi(`/api/prechecks/${encodeURIComponent(step.id)}`, { method:'POST', body: JSON.stringify({ commandId: makeCommandId('precheck-one'), runMode: uiMode === 'twin' ? 'Twin' : (uiMode === 'debug' ? 'Debug' : 'Production') }) });
    check = Array.isArray(report?.checks) ? report.checks.find(c => c && c.checkId === step.id) : null;
  } catch(e) {
    log(`单项检测请求失败：${step.label}（${e?.message || e}）`, 'err');
  }
  // 请求失败或响应缺失该项 → 绝不显示通过（unavailable/error）。
  precheckState[step.id] = check ? mapCheckStatus(check.status) : 'unavailable';
  if(check) precheckDetails[step.id] = check;
  precheckRunning = false;
  renderPrecheckList();
  const ok = precheckState[step.id] === 'pass';
  log(ok ? `单项检测通过：${step.label}` : `单项检测未通过：${step.label}`, ok ? 'ok' : 'err');
  const preflight = await refreshPreflightGate(); // 单项通过不代表整体通过，仍以 preflight.canStart 为准
  precheckPassed = false;
  setButtonState('startBtn', { disabled:true });
  renderPrecheckResultPanel(preflight);
  await loadDatabaseSnapshot();
}
async function runPrecheck() {
  if(precheckRunning) return;
  precheckRunning = true;
  precheckPassed = false;
  for(const step of PRECHECK_STEPS) precheckState[step.id] = 'running';
  setButtonState('startBtn', { disabled:true });
  showSideTab('precheck');
  renderPrecheckList();
  log('检测启动：执行 11 项真实设备检查', 'ok');
  let checks = null;
  let report = null;
  try {
    report = await backendApi('/api/prechecks', { method:'POST', body: JSON.stringify({ commandId: makeCommandId('precheck-all'), runMode: uiMode === 'twin' ? 'Twin' : (uiMode === 'debug' ? 'Debug' : 'Production') }) });
    checks = Array.isArray(report?.checks) ? report.checks : null;
  } catch(e) {
    log(`一键检测请求失败：${e?.message || e}`, 'err');
  }
  applyPrecheckChecks(checks); // 请求失败 → checks 为 null → 全部异常
  precheckRunning = false;
  renderPrecheckList();
  const preflight = await refreshPreflightGate();
  if(!report?.ok) {
    precheckPassed = false;
    setButtonState('startBtn', { disabled:true });
  }
  renderPrecheckResultPanel(preflight);
  await loadDatabaseSnapshot();
}

async function collectStainingTaskPlan() {
  try {
    const snap = await backendApi('/api/operator/snapshot');
    const selectedChannels = (snap?.channels || [])
      .filter(ch => String(ch?.workflowSelectionStatus || '').toLowerCase() === 'selected')
      .filter(ch => Array.isArray(ch?.slides));
    const taskIds = selectedChannels
      .flatMap(ch => ch.slides)
      .map(slide => slide?.stainingTaskId)
      .filter(Boolean);
    const dabTaskIds = selectedChannels
      .filter(ch => String(ch?.experimentType || '').toUpperCase() === 'IHC')
      .flatMap(ch => ch.slides)
      .map(slide => slide?.stainingTaskId)
      .filter(Boolean);
    return {
      taskIds:[...new Set(taskIds.map(String))],
      dabTaskIds:[...new Set(dabTaskIds.map(String))]
    };
  } catch(err) { return { taskIds:[], dabTaskIds:[] }; }
}

async function ensureMockDabBatch(taskIds) {
  if(uiMode !== 'twin' || !Array.isArray(taskIds) || !taskIds.length) return null;
  const requestedTaskIds = [...new Set(taskIds.map(String))].sort();
  const positions = await backendApi('/api/dab/positions');
  const activeBatchIds = [...new Set((Array.isArray(positions) ? positions : [])
    .map(x => x?.activeDabBatchId)
    .filter(Boolean))];
  for(const batchId of activeBatchIds) {
    const batch = await apiGetOrNull(`/api/dab/batches/${encodeURIComponent(batchId)}`);
    if(!batch) continue;
    const existingTaskIds = [...new Set((batch.taskIds || []).map(String))].sort();
    const sameTasks = existingTaskIds.length === requestedTaskIds.length
      && existingTaskIds.every((id, index) => id === requestedTaskIds[index]);
    const reusable = ['pendingpreparation','preparing','available'].includes(String(batch.status || '').toLowerCase())
      && String(batch.cleaningStatus || '').toLowerCase() !== 'required';
    if(sameTasks && reusable) {
      log(`复用已有 DAB 批次 ${batch.positionCode || batchId}`, 'ok');
      return batch;
    }
  }
  const sources = await backendApi('/api/dab/sources');
  const bottles = Array.isArray(sources) ? sources : [];
  const dabA = bottles.find(x => String(x.reagentCode || '').toUpperCase() === 'DBA' && String(x.status || '').toLowerCase() === 'available');
  const dabB = bottles.find(x => String(x.reagentCode || '').toUpperCase() === 'DBB' && String(x.status || '').toLowerCase() === 'available');
  if(!dabA || !dabB) throw new Error('Mock DAB 配液需要可用的 DBA 和 DBB 试剂瓶，请重新扫描全部试剂。');
  return await writeApi('/api/dab/batches', {
    method:'POST',
    body:JSON.stringify({
      commandId:makeCommandId('mock-dab-batch'),
      taskIds,
      dabAReagentBottleId:dabA.id,
      dabBReagentBottleId:dabB.id
    })
  });
}

async function startRealRun() {
  if(running) return;
  setButtonState('startBtn', { disabled:true });
  try {
    const report = await writeApi('/api/run/preflight', { method:'GET' });
    if(!report?.ok) {
      log('启动前校验未通过，请先完成检测', 'err');
      showSideTab('precheck');
      renderPrecheckList();
      const blockingIssues = (report?.issues || []).filter(x => String(x.severity || 'Fail').toLowerCase() !== 'warning');
      setInfoPanel('启动已拦截', blockingIssues.length ? blockingIssues.map(localizePreflightIssue) : ['启动条件尚未满足，请重新检测后再试。']);
      setButtonState('startBtn', { disabled:!precheckPassed });
      return;
    }
    let run = await apiGetOrNull('/api/runs/current');
    const currentRunStatus = String(run?.status || '').toLowerCase();
    if(currentRunStatus === 'faulted') {
      setInfoPanel('存在待处理的故障运行', ['请先停止或完成故障恢复，再创建新的染色运行。']);
      log('启动失败：当前仍有待处理的故障运行', 'err');
      setButtonState('startBtn', { disabled:!precheckPassed });
      return;
    }
    const terminalRunStatuses = ['completed', 'stopped', 'failed', 'unknown'];
    if(!run || terminalRunStatuses.includes(currentRunStatus)) {
      const { taskIds, dabTaskIds } = await collectStainingTaskPlan();
      if(!taskIds.length) {
        setInfoPanel('暂无可运行任务', ['请先扫码/创建任务后再开始。']);
        log('没有可运行的任务：请先扫码/创建任务', 'warn');
        setButtonState('startBtn', { disabled:!precheckPassed });
        return;
      }
      // DAB batches belong only to IHC tasks. Passing HE tasks here makes the
      // backend correctly reject the batch because an HE workflow must not have DAB.
      await ensureMockDabBatch(dabTaskIds);
      const created = await writeApi('/api/runs', { method:'POST', body: JSON.stringify({ commandId: makeCommandId('run-create'), stainingTaskIds: taskIds, preflightStateHash: report.stateHash || null }) });
      run = await apiGetOrNull(`/api/runs/${encodeURIComponent(created.runId)}`) || { id: created.runId, status: created.status };
    }
    const runId = run?.id || run?.runId;
    if(!runId) { log('未获取到运行 ID', 'err'); setButtonState('startBtn', { disabled:!precheckPassed }); return; }
    await writeApi(`/api/runs/${encodeURIComponent(runId)}/start`, { method:'POST', body: JSON.stringify({ commandId: makeCommandId('run-start'), preflightStateHash: report.stateHash || null }) });
    running = true; paused = false; cancelAnimation = false;
    setButtonState('startBtn', { disabled:true }); setButtonState('pauseBtn', { disabled:false, textContent:'暂停' });
    log('运行已启动', 'ok');
    await loadDatabaseSnapshot();
  } catch(err) {
    const message = err?.message || String(err || '未知错误');
    setInfoPanel('启动失败', [`启动染色运行失败：${message}`]);
    log(`启动失败：${message}`, 'err');
    setButtonState('startBtn', { disabled:!precheckPassed });
  }
}

async function pauseOrResumeRun() {
  try {

function configPaneIsComplete(section=activeConfigSection) {

    || (!!module.querySelector('#configProfileSummary') && !!module.querySelector('#configFlowFold'));
