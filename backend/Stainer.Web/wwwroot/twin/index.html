function renderConfigTimelineStepsHtml(profile) {
  const steps = profile ? profile.steps : [];
  if(profile && selectedConfigStepIndex >= steps.length) selectedConfigStepIndex = Math.max(0, steps.length - 1);
  return steps.map((step, idx) => {
    const def = stepToDef(step, idx);
    const border = def.color || '#64748b';
    const tags = [`${formatSeconds(step.durationSec)}`, `±${formatSeconds(step.toleranceSec || 0)}`];
    if(step.immediateAfterPrev) tags.push('紧邻');
    if(step.requiresTemp) tags.push(`${step.targetTempC || profile.targetTempC || appSettings.workTargetTempC || 40}℃`);
    return `<div class="config-step-brick ${selectedConfigStepIndex===idx?'active':''}" draggable="true" id="configStepBrick${idx+1}" data-step-index="${idx}" data-control-id="configStepBrick${idx+1}" style="border-left-color:${border}"><div class="config-step-index">${idx+1}</div><div class="config-step-main"><div class="config-step-title"><span>${escapeHtml(def.label)}</span></div><div class="config-step-sub"><span>${escapeHtml(tags.join(' · '))}</span></div></div><span>${opShapeHtml(def)}</span></div>`;
  }).join('');
}
function refreshConfigFlowTitle(profile=getSelectedProfile()) {
  const steps = profile?.steps || [];

function bindConfigStepBrickHandlers(root=document) {
  root.querySelectorAll('.config-step-brick').forEach(brick => {
    if(brick.dataset.stepBrickBound === 'true') return;
    brick.dataset.stepBrickBound = 'true';
    brick.addEventListener('click', evt => {
      evt.preventDefault();
      selectedConfigStepIndex = Number(brick.dataset.stepIndex || 0);
      updateConfigStepSelectionOnly();
      renderConfigStepEditorOnly();
    });
    brick.addEventListener('dragstart', evt => {
      evt.dataTransfer.setData('application/x-step-index', brick.dataset.stepIndex);
      evt.dataTransfer.effectAllowed = 'move';
    });
    brick.addEventListener('dragover', evt => evt.preventDefault());
  });
}
function updateConfigStepSelectionOnly() {
  const profile = getSelectedProfile();
  const max = Math.max(0, (profile?.steps?.length || 1) - 1);
  selectedConfigStepIndex = Math.max(0, Math.min(Number(selectedConfigStepIndex) || 0, max));
  document.querySelectorAll('#configEditorTimeline .config-step-brick').forEach(brick => {
    brick.classList.toggle('active', Number(brick.dataset.stepIndex || 0) === selectedConfigStepIndex);
  });
}
function renderConfigStepEditorOnly() {
  const column = document.getElementById('configStepColumn');
  if(!column) return;
  const oldEditor = document.getElementById('configStepEditor');
  const html = renderStepEditor(getSelectedProfile(), selectedConfigStepIndex);
  if(oldEditor) oldEditor.outerHTML = html;
  else column.insertAdjacentHTML('beforeend', html);

  bindClick('configMoveStepDownBtn', () => moveSelectedStep(1));
  bindClick('configDeleteStepBtn', deleteSelectedStep);
}
function refreshConfigTimelineOnly() {

function configSelect(id, label, options, selected='') {
  const html = options.map(opt => {
    const value = Array.isArray(opt) ? opt[0] : opt;
    const text = Array.isArray(opt) ? opt[1] : opt;
    return `<option value="${escapeHtml(String(value))}" ${String(value)===String(selected)?'selected':''}>${escapeHtml(String(text))}</option>`;

function configHoleOptions(selected='P11') {
  const sample = [];
  for(let ch=1; ch<=4; ch++) for(let i=1; i<=4; i++) sample.push(`R${ch}${i}`);
  const reagent = [];
  for(let col=1; col<=5; col++) for(let row=1; row<=8; row++) reagent.push(`S${col}${row}`);
  const mix = ['P11','P12','P21','P22','P31','P32','P41','P42','A液','B液','洗针孔1','洗针孔2','洗针孔3','洗针孔4','排毒孔','废液孔','清洗孔'];
  const all = [...mix, ...sample, ...reagent];
  return all.map(code => `<option value="${escapeHtml(code)}" ${code===selected?'selected':''}>${escapeHtml(code)}</option>`).join('');
}

// 液体类型参数：表单 -> SaveLiquidClassRequest。标注的单位换算（mm/s·mm -> μm/s·μm，×1000）为按表单标签的假设，待设备侧复核。
function liquidClassFormParams() {
  // 空字段必须返回 null（不发给后端），后端会从 source 版本继承；若发 0 会被校验拒绝（这些字段最小值 ≥1）。
  const num = id => { const s = String(document.getElementById(id)?.value || '').trim(); if(s === '') return null; const v = Number(s); return Number.isFinite(v) && v >= 0 ? Math.round(v) : null; };
  const mmToUm = id => { const s = String(document.getElementById(id)?.value || '').trim(); if(s === '') return null; const v = Number(s); return Number.isFinite(v) && v >= 0 ? Math.round(v * 1000) : null; };
  const yn = id => { const v = String(document.getElementById(id)?.value || ''); return v === '是' ? true : (v === '否' ? false : null); };
  const out = {};
  const set = (k, v) => { if(v !== null && v !== undefined) out[k] = v; };
  set('aspirateSpeedUlPerSecond', num('aspSpeedInput'));
  set('dispenseSpeedUlPerSecond', num('dispSpeedInput'));
  set('leadingAirGapUl', num('aspLeadingAirGapInput'));
  set('trailingAirGapUl', num('aspTrailingAirGapInput'));
  set('excessVolumeUl', num('aspExcessVolumeInput'));
  set('conditioningVolumeUl', num('aspConditioningVolumeInput'));
  set('liquidDetectionEnabled', yn('aspUseLldSelect'));
  set('liquidDetectionSensitivityPercent', num('aspLldSensitivityInput'));
  set('liquidDetectionSpeedUmPerSecond', mmToUm('aspLldDownSpeedInput')); // mm/s -> μm/s
  set('liquidFollowingDepthUm', mmToUm('aspFollowDepthInput'));           // mm -> μm
  set('aspirateDelayMs', num('aspPreDelayInput'));
  set('dispenseDelayMs', num('dispPreDelayInput'));
  set('blowoutVolumeUl', num('dispBlowoutVolumeInput'));
  set('breakoffSpeedUlPerSecond', num('dispBreakoffSpeedInput'));
  set('retractSpeedUmPerSecond', mmToUm('aspRetractSpeedInput'));         // mm/s -> μm/s
  set('aspiratePostDelayMs', num('aspPostDelayInput'));
  set('systemTrailingAirGapUl', num('aspSystemTrailingAirGapInput'));
  set('dispenseLiquidDetectionEnabled', yn('dispUseLldSelect'));
  set('dispensePostDelayMs', num('dispPostDelayInput'));
  set('dispenseRetractSpeedUmPerSecond', mmToUm('dispRetractSpeedInput'));
  set('trailingAirGapAfterEachDispenseEnabled', yn('dispTrailingAfterEachSelect'));
  return out;
}

// ===== 液体类型下拉框 ↔ 后端 GET /api/engineering/liquid-classes =====
// 调试模块有 3 处液体类型下拉框（liquidClassSelect / positionLiquidClassSelect / pipetteLiquidClassSelect）。
// 渲染时先用静态默认值占位，bindConfigHandlers 后异步从数据库拉取并回填，保证下拉框始终来自数据库。
const DEFAULT_LIQUID_CLASS_CODES = ['Ab','AR','DAB','Wash','PBS','PureWater','Custom'];
const LIQUID_CLASS_SELECT_IDS = ['liquidClassSelect','positionLiquidClassSelect','pipetteLiquidClassSelect'];
let liquidClassOptionsCache = null;      // [{code,name}]，最近一次成功从数据库拉取的结果
let liquidClassOptionsPromise = null;    // 并发去重

function rebuildLiquidClassSelect(selectEl, preferredValue) {
  if(!selectEl) return;
  const prev = (preferredValue !== undefined && preferredValue !== null && preferredValue !== '')
    ? String(preferredValue)
    : String(selectEl.value || '');
  let items = (liquidClassOptionsCache && liquidClassOptionsCache.length)
    ? liquidClassOptionsCache.slice()
    : DEFAULT_LIQUID_CLASS_CODES.map(code => ({ code, name: code }));
  // 当前选中值若尚未落库（例如刚输入的自定义 code），保留为可选项，避免回填丢失。
  if(prev && !items.some(x => String(x.code) === prev)) items = [{ code: prev, name: prev }, ...items];
  selectEl.innerHTML = items.map(x => `<option value="${escapeHtml(String(x.code))}" ${String(x.code)===prev?'selected':''}>${escapeHtml(String(x.name || x.code))}</option>`).join('');
}

function hydrateLiquidClassSelects(preferredByMap) {
  LIQUID_CLASS_SELECT_IDS.forEach(id => {
    const el = document.getElementById(id);
    if(el) rebuildLiquidClassSelect(el, preferredByMap && preferredByMap[id]);
  });
}

async function refreshLiquidClassOptionsCache() {
  if(liquidClassOptionsPromise) return liquidClassOptionsPromise;
  liquidClassOptionsPromise = (async () => {
    try {
      const list = await backendApi('/api/engineering/liquid-classes');
      const arr = Array.isArray(list) ? list : [];
      if(arr.length) liquidClassOptionsCache = arr.map(x => ({ code: String(x.code || ''), name: String(x.name || x.code || '') })).filter(x => x.code);
    } catch(e) { /* 未登录或接口异常时保留现有缓存/默认值，不抛出 */ }
    finally { liquidClassOptionsPromise = null; }
  })();
  return liquidClassOptionsPromise;
}

async function loadLiquidClassSelectsFromBackend(preferredByMap) {
  await refreshLiquidClassOptionsCache();
  hydrateLiquidClassSelects(preferredByMap);
}

// "当前液体类型"：配置页下拉框选中值 与 调试页"当前 Liquid Class"显示 共用的当前 code。
// 跨子页/跨视图保持一致；初始 'Ab'，随配置页选择或调试页读取而更新。
let currentLiquidClassCode = 'Ab';

// 调试页「液体类型」子页：从后端读取当前液体类型，回显名称/吸液速度/加液速度。
async function readDebugLiquidClass() {
  const codeEl = document.getElementById('debugLiquidClassName');
  const aspEl = document.getElementById('debugLiquidAspSpeedText');
  const dispEl = document.getElementById('debugLiquidDispSpeedText');
  let list = [];
  try { list = await backendApi('/api/engineering/liquid-classes'); } catch(e) { list = []; }
  const arr = Array.isArray(list) ? list : [];
  if(arr.length) liquidClassOptionsCache = arr.map(x => ({ code: String(x.code || ''), name: String(x.name || x.code || '') })).filter(x => x.code);
  const match = arr.find(x => x.code === currentLiquidClassCode) || arr[0];
  if(!match) {
    if(codeEl) codeEl.textContent = currentLiquidClassCode || '无';
    if(aspEl) aspEl.textContent = '待配置';
    if(dispEl) dispEl.textContent = '待配置';
    log('调试：未读取到任何液体类型（请到 配置/液体类型 新建）', 'warn');
    return;
  }
  currentLiquidClassCode = String(match.code);
  const vers = Array.isArray(match.versions) ? match.versions : [];
  const ver = vers.find(v => v && v.isReferenceable) || vers.find(v => v && v.status === 'Enabled') || vers[0] || {};
  const num = (src, k) => { const x = src && src[k]; return (x !== null && x !== undefined && Number.isFinite(x)) ? x : null; };

  const disp = num(ver, 'dispenseSpeedUlPerSecond') ?? num(match, 'dispenseSpeedUlPerSecond');

}

async function saveLiquidClassParams(isCreate) {
  const selectedCode = String(document.getElementById('liquidClassSelect')?.value || '').trim();
  const newName = String(document.getElementById('liquidClassNewNameInput')?.value || '').trim();
  // 新建：用"新建名称"输入的值作为新类型的 code（表单只有一个新建输入框），避免误用当前选中 code 覆盖现有类型；保存：用当前选中 code。
  const code = isCreate ? newName : selectedCode;
  const name = isCreate ? newName : selectedCode;
  if(isCreate && !code) { log('请先在"新建名称"里输入新液体类型编码', 'warn'); return; }
  const body = { commandId: makeCommandId(isCreate ? 'liquid-class-create' : 'liquid-class-save'), code, name, isEnabled: true, reason: isCreate ? 'twin 新建液体类型' : 'twin 保存液体类型参数', dangerousOperationConfirmed: false };
  if(!isCreate) Object.assign(body, liquidClassFormParams());
  // 保存是工程写操作，必须先有工程会话（二次认证），否则后端返回 403「权限不足」。复用模块测试的会话开启逻辑（已活动则直接复用，否则弹窗要管理员密码）。
  if(!(await ensureModuleEngineeringSession(`liquid-class:${code}`, isCreate ? '配置/液体类型：新建' : '配置/液体类型：保存参数'))) return;
  const saved = await writeApi('/api/engineering/liquid-classes', { method:'POST', body: JSON.stringify(body) });
  currentLiquidClassCode = code || currentLiquidClassCode;
  // 后端保存只产生 Draft 版本，而读取/调试页显示的是 Enabled 版本。继续 发布→启用，
  // 让刚改的参数成为生效版本；否则读出来仍是旧值（用户会以为"没存进去"）。
  const newVersionId = saved?.liquidClassVersionId;
  if(newVersionId) {
    try {
      await writeApi(`/api/engineering/liquid-class-versions/${encodeURIComponent(newVersionId)}/publish`, { method:'POST', body: JSON.stringify({ commandId: makeCommandId('liquid-class-publish'), reason: `twin 发布液体类型 ${code}`, dangerousOperationConfirmed: true }) });
      await writeApi(`/api/engineering/liquid-class-versions/${encodeURIComponent(newVersionId)}/enable`, { method:'POST', body: JSON.stringify({ commandId: makeCommandId('liquid-class-enable'), reason: `twin 启用液体类型 ${code}`, dangerousOperationConfirmed: true }) });
      log(`${isCreate ? '新建' : '保存'}液体类型 ${code} 已写入并启用为生效版本（v${saved?.versionNo ?? '?'}）`, 'ok');
    } catch(e) {
      log(`液体类型 ${code} 已保存为草稿，但发布/启用失败（读取仍显示旧版本）：${e?.message || e}`, 'warn');
    }
  } else {
    log(`${isCreate ? '新建' : '保存'}液体类型 ${code} 已写入数据库（草稿）`, 'ok');
  }
  await loadDatabaseSnapshot();
  // 保存后从数据库重新拉取，刷新所有液体类型下拉框（保留当前选中值）。
  await loadLiquidClassSelectsFromBackend({ liquidClassSelect: code, positionLiquidClassSelect: code, pipetteLiquidClassSelect: code });
  // 重新读取以回显新的生效值。
  await readLiquidClassParams();
}

async function readLiquidClassParams() {
  const code = String(document.getElementById('liquidClassSelect')?.value || '').trim();
  let list = [];
  try { list = await backendApi('/api/engineering/liquid-classes'); } catch(e) { list = []; }
  const arr = Array.isArray(list) ? list : [];
  // 顺便刷新下拉框缓存，使「读取」也能同步数据库里新增的液体类型。
  if(arr.length) liquidClassOptionsCache = arr.map(x => ({ code: String(x.code || ''), name: String(x.name || x.code || '') })).filter(x => x.code);
  hydrateLiquidClassSelects({ liquidClassSelect: code });
  const match = arr.find(x => x.code === code) || arr[0];
  if(!match) { log(`未读取到液体类型 ${code}`, 'warn'); return; }
  // 后端 LiquidClassResponse 的版本级参数（液面探测/跟随深度/回撤/断液/延时/吹干等）只存在于 versions[]，
  // profile 级只有少量共享字段。这里解析出启用/可引用版本作为运行期权威值。
  const vers = Array.isArray(match.versions) ? match.versions : [];
  const ver = vers.find(v => v && v.isReferenceable) || vers.find(v => v && v.status === 'Enabled') || vers[0] || {};
  const num = (src, k) => { const x = src && src[k]; return (x !== null && x !== undefined && Number.isFinite(x)) ? x : null; };
  const vp = k => { let x = num(ver, k); if(x === null) x = num(match, k); return x; }; // 版本级优先，回退 profile 级
  const setVal = (id, v) => { const el = document.getElementById(id); if(el && v !== null && v !== undefined && Number.isFinite(v)) el.value = v; };
  const umToMm = um => (um !== null && um !== undefined && Number.isFinite(um)) ? um / 1000 : null;
  setVal('aspSpeedInput', vp('aspirateSpeedUlPerSecond'));
  setVal('dispSpeedInput', vp('dispenseSpeedUlPerSecond'));
  setVal('aspLeadingAirGapInput', vp('leadingAirGapUl'));
  setVal('aspTrailingAirGapInput', vp('trailingAirGapUl'));
  setVal('aspExcessVolumeInput', num(match, 'excessVolumeUl'));                 // excess 仅 profile 级
  setVal('aspConditioningVolumeInput', num(ver, 'conditioningVolumeUl'));       // 仅版本级
  setVal('aspUseLldSelect', ver.liquidDetectionEnabled === true ? '是' : (ver.liquidDetectionEnabled === false ? '否' : null));
  setVal('aspLldSensitivityInput', num(ver, 'liquidDetectionSensitivityPercent'));
  setVal('aspLldDownSpeedInput', umToMm(num(ver, 'liquidDetectionSpeedUmPerSecond')));
  setVal('aspFollowDepthInput', umToMm(num(ver, 'liquidFollowingDepthUm')));
  setVal('aspPreDelayInput', vp('aspirateDelayMs'));
  setVal('dispPreDelayInput', vp('dispenseDelayMs'));
  setVal('dispBlowoutVolumeInput', num(ver, 'blowoutVolumeUl'));
  setVal('dispBreakoffSpeedInput', num(ver, 'breakoffSpeedUlPerSecond'));
  setVal('aspRetractSpeedInput', umToMm(num(ver, 'retractSpeedUmPerSecond')));
  setVal('aspPostDelayInput', vp('aspiratePostDelayMs'));
  setVal('aspSystemTrailingAirGapInput', vp('systemTrailingAirGapUl'));
  setVal('dispUseLldSelect', ver.dispenseLiquidDetectionEnabled === true ? '是' : (ver.dispenseLiquidDetectionEnabled === false ? '否' : null));
  setVal('dispPostDelayInput', vp('dispensePostDelayMs'));
  setVal('dispRetractSpeedInput', umToMm(num(ver, 'dispenseRetractSpeedUmPerSecond')));
  setVal('dispTrailingAfterEachSelect', ver.trailingAirGapAfterEachDispenseEnabled === true ? '是' : (ver.trailingAirGapAfterEachDispenseEnabled === false ? '否' : null));
  const label = match.code || match.name || code;
  log(`已读取液体类型 ${label} 参数（启用版本 v${ver.versionNo ?? '-'}，μm 字段 ÷1000 回显为 mm/mm·s⁻¹）`, 'ok');
}

// 样本清洗启停（wash = 一次性执行命令；wash-stop = 独立业务停止契约，非裸 PWM=0）。
let sampleWashRunId = 0;
async function startSampleWash() {
  const myRun = ++sampleWashRunId;
  const dur = Number(document.getElementById('sampleWashTimeInput')?.value);
  const durationMs = Number.isFinite(dur) ? dur : 2000;
  // 内壁 + 外壁各执行一次（一次性命令）。具体先后/参数流程后续细化。
  for(const target of ['WashInnerLeft', 'WashOuterLeft']) {
    if(myRun !== sampleWashRunId) { log('样本清洗已被停止，跳过后续段', 'warn'); return; }
    await writeApi('/api/fluidics/wash', { method:'POST', body: JSON.stringify({ commandId: makeCommandId('sample-wash-' + target), targetPointCode: target, speedPercent: 60, durationMs, reason: 'twin 样本清洗 ' + target }) });
  }
  log('样本清洗已执行（内壁 + 外壁各一次）', 'ok');
  await loadDatabaseSnapshot();
}
async function stopSampleWash() {

// 「通信测试」：真实打开选中的 COM 口收发测试字节（POST /api/engineering/serial-debug/exchange，admin-only）。
// 环回（RX↔TX 短接）下发什么收什么；串口助手配合时后端发助手收、助手发后端读。结果写入调试控制台。
async function runSerialDebugExchange() {
  const text = id => (document.getElementById(id)?.value || '').trim();
  const port = text('debugComPortSelect');
  if(!port) { log('请先选择 COM 口', 'warn'); return; }
  const body = {
    commandId: makeCommandId('serial-debug'),
    portName: port,
    baudRate: Number(text('debugBaudRateSelect')) || 115200,
    dataBits: Number(text('debugDataBitsSelect').replace(/[^\d]/g, '')) || 8,
    parity: text('debugParitySelect') === '无' ? 'None' : (text('debugParitySelect') || 'None'),
    stopBits: text('debugStopBitsSelect').startsWith('2') ? 'Two' : 'One',
    text: document.getElementById('debugComTestTextInput')?.value ?? 'PING',
    timeoutMs: Number(document.getElementById('debugComTestTimeoutInput')?.value) || 1000,
    reason: '调试：通信测试'
  };
  const consoleEl = document.getElementById('debugCommandConsole');
  const writeLine = line => { if(consoleEl) consoleEl.textContent += '\n' + line; };
  writeLine(`> [${new Date().toLocaleTimeString()}] 通信测试 ${body.portName} @ ${body.baudRate}，发送：${body.text}`);
  try {
    const res = await writeApi('/api/engineering/serial-debug/exchange', { method:'POST', body: JSON.stringify(body) });
    const ok = !!res?.ok;
    writeLine(`< [${new Date().toLocaleTimeString()}] ${ok ? '✓ 成功' : '✗ 失败'}${res?.errorCode ? ' (' + res.errorCode + ')' : ''}，耗时 ${res?.durationMs ?? '-'} ms`);
    writeLine(`  发送 hex：${res?.sentHex || '-'}`);
    writeLine(`  接收文本：${res?.receivedText ?? ''}`);
    writeLine(`  接收 hex：${res?.receivedHex || '-'}`);
    if(res?.message) writeLine(`  ${res.message}`);
    log(`通信测试 ${body.portName}：${ok ? '成功' : '失败'}，接收 ${(res?.receivedHex || '').length / 2} 字节`, ok ? 'ok' : 'warn');
  } catch(e) {
    writeLine(`< [${new Date().toLocaleTimeString()}] ✗ 请求失败：${e?.message || e}`);
    log(`通信测试失败：${e?.message || e}`, 'err');
  }
}

// ===== 调试模块 精度校正 ↔ 后端 precision_calibration_profiles（scope=move|dispense）=====
// move scope → X/Y 校正偏差(mm)；dispense scope → 加样目标/实测体积(μL)，后端派生校正因子 = measured/target。
function debugPrecisionNumber(id) {
  const raw = (document.getElementById(id)?.value || '').toString().trim();
  if(raw === '') return null;
  const n = Number(raw);
  return Number.isFinite(n) ? n : null;
}
function applyDebugPrecisionFromBackend(moveCfg, dispenseCfg) {
  const setVal = (id, v) => { const el = document.getElementById(id); if(el && v != null) el.value = v; };
  if(moveCfg) {
    setVal('debugMovePrecisionXInput', moveCfg.moveOffsetXMm != null ? Number(moveCfg.moveOffsetXMm).toFixed(3) : null);
    setVal('debugMovePrecisionYInput', moveCfg.moveOffsetYMm != null ? Number(moveCfg.moveOffsetYMm).toFixed(3) : null);
  }
  if(dispenseCfg) {
    setVal('debugDispenseTargetInput', dispenseCfg.dispenseTargetVolumeUl != null ? Number(dispenseCfg.dispenseTargetVolumeUl) : null);
    setVal('debugDispenseMeasuredInput', dispenseCfg.dispenseMeasuredVolumeUl != null ? Number(dispenseCfg.dispenseMeasuredVolumeUl) : null);
  }
}
async function readDebugPrecisionConfig(scope) {
  const cfg = await backendApi(`/api/engineering/precision-calibration/${encodeURIComponent(scope)}`);
  if(scope === 'move') {
    applyDebugPrecisionFromBackend(cfg, null);
    log(`已读取移动精度校正：X=${cfg.moveOffsetXMm ?? 0}mm Y=${cfg.moveOffsetYMm ?? 0}mm（已保存到数据库，未触发机械动作）`, 'ok');
  } else {
    applyDebugPrecisionFromBackend(null, cfg);
    const factor = cfg.dispenseCalibrationFactor != null ? Number(cfg.dispenseCalibrationFactor).toFixed(4) : '—';
    log(`已读取加样精度校正：目标=${cfg.dispenseTargetVolumeUl ?? '—'}μL 实测=${cfg.dispenseMeasuredVolumeUl ?? '—'}μL 校正因子=${factor}`, 'ok');
  }
}
async function saveDebugPrecisionConfig(scope) {
  const body = scope === 'move'
    ? { moveOffsetXMm: debugPrecisionNumber('debugMovePrecisionXInput'), moveOffsetYMm: debugPrecisionNumber('debugMovePrecisionYInput') }
    : { dispenseTargetVolumeUl: debugPrecisionNumber('debugDispenseTargetInput'), dispenseMeasuredVolumeUl: debugPrecisionNumber('debugDispenseMeasuredInput') };
  await writeApi(`/api/engineering/precision-calibration/${encodeURIComponent(scope)}`, { method:'PUT', body: JSON.stringify(Object.assign({
    commandId: makeCommandId('debug-precision-' + scope), reason: scope === 'move' ? '调试：校正移位精度确认' : '调试：校正加样精度确认'
  }, body)) });
  log(`${scope === 'move' ? '移动' : '加样'}精度校正已保存到数据库${scope === 'dispense' && body.dispenseMeasuredVolumeUl != null && body.dispenseTargetVolumeUl ? '（因子需 admin 提交后由后端计算）' : ''}`, 'ok');
  await readDebugPrecisionConfig(scope);
}
async function autoLoadDebugPrecisionConfig() {
  try {
    const [move, dispense] = await Promise.all([
      backendApi('/api/engineering/precision-calibration/move'),

async function runConfigPipetteAction(operation, actionLabel) {
  const hole = document.getElementById('pipetteHoleSelect')?.value || 'P11';
  const volume = Math.max(0, Number(document.getElementById('pipetteVolumeInput')?.value) || 0);
  const needle = document.getElementById('pipetteNeedleSelect')?.value || 'Z1';
  const needleCode = needle === 'Z2' ? 'Needle2' : 'Needle1';
  const liquidClass = document.getElementById('pipetteLiquidClassSelect')?.value || '';
  const channel = needle === 'Z2' ? '2' : '1';
  if(!(await ensureModuleEngineeringSession(`pipetting-test:${operation}`, actionLabel))) return;
  const body = { CommandId: makeCommandId('cfg-pipette-' + operation), Channel: channel, Position: hole, VolumeUl: volume, NeedleCode: needleCode, Reason: actionLabel, DangerousOperationConfirmed: true };
  if(liquidClass) body.LiquidClassCode = liquidClass;
  try {
    const res = await writeApi(`/api/engineering/pipetting-tests/${encodeURIComponent(operation)}`, { method:'POST', body: JSON.stringify(body) });

    log(`${actionLabel} 已下发后端：通道${channel} 孔位${hole} ${volume}μL ${needle}`, 'ok');

async function loadPipetteHoleOptions() {
  const sel = document.getElementById('pipetteHoleSelect'); if(!sel) return;
  try {
    const profs = await backendApi('/api/engineering/coordinate-profiles');
    const prof = (Array.isArray(profs) ? profs : []).find(p => p && p.isActive) || (Array.isArray(profs) ? profs[0] : null);
    if(!prof) return;
    const pts = (prof.points || []).concat((prof.versions || []).flatMap(v => v.targetPoints || []));
    const wanted = ['ReagentRackPosition', 'WashPosition', 'DabMixPosition'];
    const enabled = pts.filter(p => p && p.isEnabled && (!p.pointType || wanted.includes(p.pointType)));
    if(!enabled.length) return;

      const baudEl = document.getElementById('svg-arm-main-baud');

        port: portEl?.value || 'COM1',
        baud: baudEl?.value || '115200',

      };

      try { saved = JSON.parse(localStorage.getItem('digitalTwinArmComConfig') || 'null'); } catch(e) { saved = null; }
      const stamp = new Date().toLocaleTimeString();
      let message = '';

      if(consoleNode && message) consoleNode.textContent += `\n[${stamp}] ${message}`;

function handleArmComAction(action) {
  const port = document.getElementById('armComPortSelect')?.value || 'COM1';
  const baud = document.getElementById('armBaudRateSelect')?.value || '115200';
  const serial = document.getElementById('armSerialPresetInput')?.value || '8 bits / 1 bits / 无';
  const status = document.getElementById('armComStatusInput');
  const consoleNode = document.getElementById('armComConsole');
  let saved = null;
  try { saved = JSON.parse(localStorage.getItem('digitalTwinArmComConfig') || 'null'); } catch(e) { saved = null; }
  const stamp = new Date().toLocaleTimeString();
  let message = '';
  if(action === 'config/arm:set-com') {
    try { localStorage.setItem('digitalTwinArmComConfig', JSON.stringify({ port, baud, serial })); } catch(e) {}
    if(status) status.value = `已设置 / ${port} @ ${baud}`;
    message = `设置机械臂 COM：${port} @ ${baud}，${serial}`;
  } else if(action === 'config/arm:read-com') {
    const cfg = saved || { port, baud, serial };
    const setValue = (id, value) => { const el = document.getElementById(id); if(el) el.value = value; };
    setValue('armComPortSelect', cfg.port || 'COM1');
    setValue('armBaudRateSelect', cfg.baud || '115200');
    setValue('armSerialPresetInput', cfg.serial || '8 bits / 1 bits / 无');
    if(status) status.value = `已读取 / ${cfg.port || 'COM1'} @ ${cfg.baud || '115200'}`;
    message = `读取机械臂 COM：${cfg.port || 'COM1'} @ ${cfg.baud || '115200'}，${cfg.serial || '8 bits / 1 bits / 无'}`;
  } else if(action === 'config/arm:restart-com') {
    if(status) status.value = `重启完成 / ${port} @ ${baud}`;
    message = `机械臂通讯已重启（模拟）：${port} @ ${baud}`;
  }
  if(consoleNode && message) consoleNode.textContent += `\n[${stamp}] ${message}`;
  if(message) log(message, 'ok');
}

async function dispatchEngineeringAction(action, btn) {
  if(btn) flashControl(btn);
  const consoleNode = document.querySelector('.test-console');
  try {
    if(String(action || '').startsWith('config/arm:')) { handleArmComAction(action); return; }
    if(action === '配置/清洗混匀：开始混匀' || action === '配置/清洗混匀：混匀复位') {
      const drawer = drawerFromChannelSelect('thermalMixChannelSelect');
      if(!drawer) { log('请先在"通道选择"选择具体通道（1-4）再操作混匀', 'warn'); return; }
      const op = action.endsWith('混匀复位') ? 'stop' : 'start';
      await writeApi(`/api/fluidics/mixers/${encodeURIComponent(drawer)}/${op}`, { method:'POST', body: JSON.stringify({ commandId: makeCommandId('mixer-' + op), reason: `twin ${action}` }) });
      log(`${action}（通道${drawer}）已下发，需管理员 + 工程会话`, 'ok');
      await loadDatabaseSnapshot();
      return;
    }
    if(action === '配置/清洗混匀：查询混匀') {
      const state = await backendApi('/api/fluidics/state');
      log(`${action}：pumps=${(state?.pumps || []).length}, ready=${state?.ready}`, 'ok');
      return;
    }
    if(action === '配置/清洗混匀：打开样本清洗') return await startSampleWash();
    if(action === '配置/清洗混匀：关闭样本清洗') return await stopSampleWash();
    if(action === '配置/清洗混匀：查询阀状态') return await readFluidicsValveState();
    if(action === '配置/清洗混匀：保存混匀参数') return await saveMixerParameters();
    if(action === '配置/清洗混匀：保存清洗配置') return await saveWashValveConfig();
    if(action === '配置/混匀加热：开始加热' || action === '配置/混匀加热：停止加热') {
      const isEnabled = action.endsWith('停止加热') ? false : true;
      const rawTemp = Number(String(document.getElementById('mixHeatTargetTempInput')?.value || '').replace(/[^\d.\-]/g, ''));
      const targetDeciC = Number.isFinite(rawTemp) ? Math.round(rawTemp * 10) : 500;
      const drawers = mixHeatDrawers();
      for(const d of drawers) {
        await writeApi(`/api/thermal/boards/${encodeURIComponent(d)}`, { method:'POST', body: JSON.stringify({ commandId: makeCommandId('thermal-board'), targetTemperatureDeciC: targetDeciC, isEnabled }) });
      }
      log(`${action}：drawer=${drawers.join(',')} 目标=${rawTemp}℃(${targetDeciC}) isEnabled=${isEnabled} 已下发`, 'ok');
      await loadDatabaseSnapshot();
      return;
    }
    if(action === '配置/混匀加热：查询温度') {
      const state = await backendApi('/api/thermal/state');
      const drawers = mixHeatDrawers();
      const pts = (state?.points || []).filter(p => drawers.includes(p.drawerCode));
      const summary = pts.slice(0, 8).map(p => `${p.drawerCode}${p.slotNo}=${(p.currentTemperatureDeciC/10).toFixed(1)}℃`).join(' ') || '--';
      const cur = document.getElementById('mixHeatCurrentTempInput');
      const stat = document.getElementById('mixHeatStatusInput');
      if(cur && pts.length) cur.value = `${(pts[0].currentTemperatureDeciC/10).toFixed(1)}℃`;
      if(stat && pts.length) stat.value = pts.some(p => p.isEnabled && String(p.status || '').toLowerCase() !== 'off') ? '加热中' : '待机';
      log(`${action}：drawer=${drawers.join(',')} ${pts.length}点 ${summary}`, 'ok');
      return;
    }
    if(action === '配置/液体类型：新建液体类型') return await saveLiquidClassParams(true);
    if(action === '配置/液体类型：保存液体类型参数' || action === '配置/液体类型：保存吸液加液参数') return await saveLiquidClassParams(false);
    if(action === '配置/液体类型：读取液体类型参数') return await readLiquidClassParams();
    if(action === '配置/扫码器：创建扫码器') return await createScannerProfile();
    if(action === '配置/扫码器：设置COM口') return await setScannerComConfig();
    if(action === '配置/扫码器：读取COM口') return await readScannerComConfig();
    if(['配置/扫码器：设置ROI','配置/扫码器：打开校验光','配置/扫码器：关闭校验光','配置/扫码器：重新启动','配置/扫码器：激活单次触发','配置/扫码器：停止单次触发','配置/扫码器：激活连续触发','配置/扫码器：停止连续触发','配置/扫码器：读取条码'].includes(action)) return await scannerControl(action);
    if(action === '调试：校正移位精度确认') return await saveDebugPrecisionConfig('move');
    if(action === '调试：校正加样精度确认') return await saveDebugPrecisionConfig('dispense');
    if(action === '调试：设置COM口参数') return await saveDebugComConfig();
    if(action === '调试：读取COM口参数') return await readDebugComConfig();
    if(action === '调试：通信测试') return await runSerialDebugExchange();
    if(action === '调试：加样臂测试') return await runModuleArmTest();
    if(action === '调试：条码扫描测试') return await runModuleBarcodeTest();
    if(action === '调试：混匀测试') return await runModuleMixTest();
    if(action === '调试：清洗控制测试') return await runModuleWashTest();

// ===== 配置/通道移位 ↔ 后端 coordinate_points / coordinate_calibration_history =====
// UI 孔位码 → 后端 coordinate_points.point_code 映射（依据项目 §11.3–11.5）：
//   DAB: P11→M1..P42→M8、A液→DabA、B液→DabB
//   样本: R<通道1-4><槽1-4> → A-D 抽屉的 04/03/02/01（如 R11→A-04、R14→A-01、R44→D-01）
//   试剂: S<列1-5><行1-8> → R1..R40（如 S11→R1、S58→R40）
//   洗针: 洗针孔1-4 → WashOuterLeft/Right、WashInnerLeft/Right（§11.5 措辞，按外/内顺序）
//   排毒孔/废液孔/清洗孔: 无对应坐标点 → null（不校正）。
function uiHoleToDbPoint(code) {
  const c = String(code || '').trim();
  if(!c) return null;
  const dab = { 'P11':'M1','P12':'M2','P21':'M3','P22':'M4','P31':'M5','P32':'M6','P41':'M7','P42':'M8','A液':'DabA','B液':'DabB' };
  if(dab[c]) return dab[c];
  const wash = { '洗针孔1':'WashOuterLeft','洗针孔2':'WashOuterRight','洗针孔3':'WashInnerLeft','洗针孔4':'WashInnerRight' };
  if(wash[c]) return wash[c];
  const mSample = c.match(/^R([1-4])([1-4])$/);
  if(mSample) { const drawer = 'ABCD'[Number(mSample[1]) - 1]; return `${drawer}-0${5 - Number(mSample[2])}`; }
  const mReagent = c.match(/^S([1-5])([1-8])$/);
  if(mReagent) return `R${(Number(mReagent[1]) - 1) * 8 + Number(mReagent[2])}`;
  return null;
}
const positionMmToUm = v => { const n = Number(v); return (v === '' || v == null || !Number.isFinite(n)) ? null : Math.round(n * 1000); };
const positionUmToMm = v => { const n = Number(v); return (v == null || !Number.isFinite(n)) ? null : n / 1000; };
let _coordProfilesCache = null, _coordProfilesCacheAt = 0;
// coordinate-profiles 响应很大（所有版本×坐标点，~500KB），快速切换对象会并发打爆后端→超时。
// 缓存 5 秒，避免每次打开对象都重新拉取；校正后手动失效以保证拿到最新草稿。
async function fetchCoordinateProfiles() {
  const now = Date.now();
  if(_coordProfilesCache && (now - _coordProfilesCacheAt) < 5000) return _coordProfilesCache;
  _coordProfilesCache = await backendApi('/api/engineering/coordinate-profiles');
  _coordProfilesCacheAt = now;
  return _coordProfilesCache;
}
function invalidateCoordinateProfilesCache() { _coordProfilesCache = null; }
async function resolveActiveCoordinateProfile() {
  const list = await fetchCoordinateProfiles();
  const arr = Array.isArray(list) ? list : [];
  return arr.find(p => p && p.isActive) || arr[0] || null;
}
async function savePositionHoleInfo() {
  const uiCode = String(document.getElementById('positionHoleSelect')?.value || '').trim();

  if(!dbPoint) { log(`孔位「${uiCode}」没有对应的后端坐标点（排毒/废液/清洗孔未纳入坐标体系），无法校正`, 'warn'); return; }
  const profile = await resolveActiveCoordinateProfile();
  if(!profile || !profile.code) { log('未找到活动的坐标档案（coordinate profile），无法校正', 'warn'); return; }
  const body = {
    commandId: makeCommandId('coordinate-calibrate'),
    profileCode: profile.code,
    pointCode: dbPoint,
    calibratedXUm: positionMmToUm(document.getElementById('positionHoleXInput')?.value),
    calibratedYUm: positionMmToUm(document.getElementById('positionHoleYInput')?.value),
    safeZUm: positionMmToUm(document.getElementById('positionZTravelInput')?.value),

    reason: `配置/通道移位：保存孔位 ${uiCode}→${dbPoint}`,
    dangerousOperationConfirmed: true
  };
  if(!(await ensureModuleEngineeringSession(`coordinate-calibrate:${dbPoint}`, '配置/通道移位：保存孔位信息'))) return;
  const res = await writeApi('/api/engineering/coordinate-points/calibrate', { method:'POST', body: JSON.stringify(body) });
  log(`孔位 ${uiCode}（→${dbPoint}）校正已写入数据库：X/Y + 安全/探液/瓶底/移液 Z 以 µm 落表，生成新草稿版本与校准历史${res?.entityId ? '（'+res.entityId.slice(0,8)+'）' : ''}`, 'ok');
  await loadDatabaseSnapshot();
  await readPositionHoleInfo();

async function readPositionHoleInfo() {
  const uiCode = String(document.getElementById('positionHoleSelect')?.value || '').trim();

  if(!profile) { log('未找到活动坐标档案', 'warn'); return; }

  const pt = dbPoint ? points.find(p => p && p.pointCode === dbPoint) : null;
  if(!pt) { log(`孔位「${uiCode}」（→${dbPoint || '无对应'}）在活动坐标档案 ${profile.code} 中未找到坐标点`, 'warn'); return; }
  const setMm = (id, um) => { const mm = positionUmToMm(um); const el = document.getElementById(id); if(el && mm !== null) el.value = mm; };
  setMm('positionHoleXInput', pt.calibratedXUm ?? pt.presetXUm);
  setMm('positionHoleYInput', pt.calibratedYUm ?? pt.presetYUm);
  setMm('positionZTravelInput', pt.safeZUm);
  setMm('positionZStartInput', pt.aspirateZUm);
  setMm('positionZEndInput', pt.aspirateEndZUm);
  setMm('positionZDispensInput', pt.dispenseZUm);
  log(`已读取孔位 ${uiCode}（→${dbPoint}）坐标：X=${positionUmToMm(pt.calibratedXUm ?? pt.presetXUm)}mm Y=${positionUmToMm(pt.calibratedYUm ?? pt.presetYUm)}mm（µm÷1000 回显，未触发机械动作）`, 'ok');
}

  const nextStep = normalizeConfigStep({ opKey, label:op.label, durationSec:10, toleranceSec:0, immediateAfterPrev:false }, idx);
  const planned = deepClone(p); planned.steps.splice(idx, 0, nextStep);

async function reorderStep(from, to) {
  const p = requireEditableProfile(); if(!p || from < 0 || from >= p.steps.length) return;
  let insertAt = Math.max(0, Math.min(Number(to), p.steps.length));
  if(from < insertAt) insertAt -= 1;
  if(from === insertAt) return;
  let current = from;
  try {
    while(current !== insertAt) {
      const latest = getProfileById(p.id);
      const step = latest.steps[current];
      const moveUp = insertAt < current;
      await writeApi(`/api/workflow-versions/${encodeURIComponent(p.id)}/steps/${encodeURIComponent(step.id)}/${moveUp ? 'move-up' : 'move-down'}`, { method:'POST', body:JSON.stringify({ commandId:makeCommandId('workflow-step-reorder') }) });
      current += moveUp ? -1 : 1;
      await loadWorkflowProfilesFromBackend(true);
    }
    await refreshWorkflowEditor(p.id, 'files', insertAt);
  } catch(err) { /* routed by writeApi */ }
}

function makeCommandId(prefix='ui') {
  return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
}
async function backendApi(path, options={}) {
  const headers = Object.assign({}, options.headers || {});
  const hasBody = Object.prototype.hasOwnProperty.call(options, 'body') && options.body !== undefined;
  if(hasBody && !headers['Content-Type']) headers['Content-Type'] = 'application/json';
  const controller = options.signal ? null : new AbortController();
  const timer = controller ? setTimeout(() => controller.abort(), 20000) : null;
  let res;
  try {
    res = await fetch(path, Object.assign({ credentials:'same-origin', cache:'no-store' }, options, { headers, signal: options.signal || controller?.signal }));
  } catch(err) {
    if(err?.name === 'AbortError') throw new Error(`请求超时：${path}`);
    throw err;
  } finally {
    if(timer) clearTimeout(timer);
  }
  if(!res.ok) {
    let detail = '';
    let payload = null;
    try {
      payload = await res.json();
      detail = payload.detail || payload.message || payload.code || '';
    } catch(e) {
      try { detail = await res.text(); } catch(_) {}
    }
    const apiErr = new Error(detail || `HTTP ${res.status}`);
    apiErr.status = res.status;
    apiErr.data = payload;
    throw apiErr;
  }
  if(res.status === 204) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}
function routeWriteError(err) {
  const status = err?.status;
  const detail = err?.message || '';
  if(status === 401) {
    CURRENT_USER = { id:'', username:'', name:'未登录', role:'guest' };
    applyUserRoleUi(); renderUserMenu(); setLoginVisible(true);
    log('登录已失效，请重新登录', 'err');
  } else if(status === 403) {
    log(`权限不足：${detail || '当前身份无法执行该操作'}`, 'err');
  } else if(status === 400 || status === 409) {
    log(`请求未通过：${detail || '请检查输入后重试'}`, 'err');
  } else {
    log(`操作失败：${detail || '请稍后重试'}`, 'err');
  }
}
async function writeApi(path, options={}) {
  try {
    return await backendApi(path, options);
  } catch(err) {
    routeWriteError(err);
    throw err;
  }
}
async function apiGetOrNull(path) {
  try {
    return await backendApi(path);
  } catch(err) {
    if(err?.status === 404) return null;
    routeWriteError(err);
    throw err;
  }
}
function normalizeBackendUser(user) {
  const roles = Array.isArray(user?.roles) && user.roles.length ? user.roles : [user?.role || 'operator'];
  const primaryRole = roles.includes('admin') ? 'admin' : (roles[0] || 'operator');
  return {
    id: String(user?.id || user?.username || ''),
    username: String(user?.username || ''),
    name: String(user?.displayName || user?.name || user?.username || ''),
    role: primaryRole,
    roles: roles.map(role => String(role)).filter(Boolean),
    enabled: user?.enabled !== false
  };
}
function normalizeBackendRole(role) {
  return {
    id: String(role?.id || role?.code || ''),
    code: String(role?.code || role?.id || ''),
    name: String(role?.name || role?.code || role?.id || '')
  };
}
function roleDisplayName(role) {
  if(role === 'admin') return '管理员';
  if(role === 'operator') return '实验员';
  const match = backendRoles.find(item => item.code === role || item.id === role);
  return match?.name || role;
}
async function refreshBackendUsers(force=false) {
  if(backendUsersLoading) return;
  if(backendUsersLoaded && !force) return;
  backendUsersLoading = true;
  try {
    const [users, roles] = await Promise.all([backendApi('/api/users'), backendApi('/api/roles')]);
    backendUsers = Array.isArray(users) ? users.map(normalizeBackendUser) : [];
    backendRoles = Array.isArray(roles) ? roles.map(normalizeBackendRole).filter(role => role.code) : [];
    backendUsersLoaded = true;
  } finally {
    backendUsersLoading = false;
  }
}

  });

// /api/twin/snapshot 是真实 UI 状态的唯一主干；SignalR /hubs/machine 与低频轮询都只作为
// “状态已变化”的通知源，统一收敛到 scheduleDatabaseSnapshotRefresh(reason) 触发一次防抖的
// loadDatabaseSnapshot，绝不直接写复杂 UI 状态。六个演示按钮保留前端模拟逻辑，其瞬态写入
// 会在下一次 snapshot 刷新时被自动覆盖（瞬态叠加 + 自愈）。
let _snapshotRefreshTimer = null;       // 防抖定时器：合并短时间内的多次刷新请求

// 并发保护统一由 loadDatabaseSnapshot 的单例在途 Promise 提供，覆盖所有直接与间接调用方，
// 因此这里只需防抖触发，无需再维护在途/排队状态。
function scheduleDatabaseSnapshotRefresh(reason) {
  if(reason) _snapshotRefreshLastReason = reason;
  if(_snapshotRefreshTimer) return;     // 已在防抖窗口内，合并本次请求
  _snapshotRefreshTimer = setTimeout(() => {
    _snapshotRefreshTimer = null;

  }, SNAPSHOT_REFRESH_DEBOUNCE_MS);

// 不在客户端直接写复杂 UI 状态；type=6 为 ping，回 pong 保活。

      try { _machineSocket.send(JSON.stringify({ protocol:'json', version:1 }) + '\x1e'); } catch(e) {}
      // 不在此重置退避、也不在此刷新 snapshot：鉴权失败时 onopen 会触发但连接随即被 abort，
      // 必须等收到首条真实帧才确认稳定（见 _confirmMachineConnection）。
    };
    _machineSocket.onmessage = event => {
      String(event.data || '').split('\x1e').filter(Boolean).forEach(frame => {
        let message;
        try { message = JSON.parse(frame); } catch(e) { return; }
        if(!message) return;
        if(message.type === 6) {         // SignalR ping：确认连接稳定 + 回 pong 保活
          _confirmMachineConnection();
          try { _machineSocket.send('{"type":6}\x1e'); } catch(e) {}
          return;
        }
        if(message.type === 1 && message.target === 'machineEvent') {
          _confirmMachineConnection();
          const evt = message.arguments && message.arguments[0];
          const type = (evt && evt.type) || 'machineEvent';
          // 收到任意机器状态变化通知 → 仅触发一次防抖 snapshot 刷新
          scheduleDatabaseSnapshotRefresh('signalr:' + type);
        }
      });
    };
    _machineSocket.onclose = () => {
      _machineSocketConnected = false;
      _scheduleMachineReconnect();      // 未确认连接时退避会继续增长
      scheduleNextSnapshotPoll();       // 断线：切换到加速轮询兜底
    };
    _machineSocket.onerror = () => { try { _machineSocket.close(); } catch(e) {} };
  } catch(e) {
    _machineSocketConnected = false;
    _scheduleMachineReconnect();
  }
}

// 收到首条真实帧（ping/machineEvent）= 已通过鉴权并加入授权组 → 认定连接稳定：
// 重置退避、标记已连接、刷新一次 snapshot。
function _confirmMachineConnection() {
  const firstEver = !_machineEverConnected;
  _machineEverConnected = true;
  if(_machineSocketConnected) return;   // 已确认过，避免重复刷新
  _machineSocketConnected = true;
  _machineReconnectDelayMs = 1000;      // 稳定连接：重置退避
  scheduleDatabaseSnapshotRefresh(firstEver ? 'signalr:connected' : 'signalr:reconnected');
  scheduleNextSnapshotPoll();           // 已确认连接：切换到低频轮询
}

function _scheduleMachineReconnect() {
  if(!_realtimeSyncStarted) return;     // 已退出登录：不再重连
  if(_machineReconnectTimer) return;
  _machineReconnectTimer = setTimeout(() => {
    _machineReconnectTimer = null;
    connectMachineHub();
    _machineReconnectDelayMs = Math.min(_machineReconnectDelayMs * 2, 10000);
  }, _machineReconnectDelayMs);
}

// ===== 低频轮询兜底（SignalR 已确认连接时降速，断线时加速）=====
const SNAPSHOT_POLL_CONNECTED_MS = 20000;
const SNAPSHOT_POLL_DISCONNECTED_MS = 5000;
let _snapshotPollTimer = null;

function scheduleNextSnapshotPoll() {
  if(_snapshotPollTimer) clearTimeout(_snapshotPollTimer);
  if(!_realtimeSyncStarted) return;     // 已退出登录：停止轮询
  const delay = _machineHubConnected() ? SNAPSHOT_POLL_CONNECTED_MS : SNAPSHOT_POLL_DISCONNECTED_MS;
  _snapshotPollTimer = setTimeout(() => {
    _snapshotPollTimer = null;
    if(!_realtimeSyncStarted) return;   // 已退出登录：不再自恢复
    scheduleDatabaseSnapshotRefresh('poll');
    scheduleNextSnapshotPoll();
  }, delay);
}

// ===== 实时同步生命周期：登录后启动，退出登录时彻底关闭连接/重连/轮询 =====
function startRealtimeSync() {
  _realtimeSyncStarted = true;
  connectMachineHub();                  // 已在连接则内部自行跳过，安全幂等
  scheduleNextSnapshotPoll();
}

function stopRealtimeSync() {
  _realtimeSyncStarted = false;
  if(_snapshotRefreshTimer) { clearTimeout(_snapshotRefreshTimer); _snapshotRefreshTimer = null; } // 取消已排队的防抖刷新
  _snapshotTrailingRefresh = false;   // 在途抓取结束后不再补抓，避免退出后多发一次 snapshot(401)
  if(_snapshotPollTimer) { clearTimeout(_snapshotPollTimer); _snapshotPollTimer = null; }
  if(_machineReconnectTimer) { clearTimeout(_machineReconnectTimer); _machineReconnectTimer = null; }
  _machineReconnectDelayMs = 1000;
  _machineEverConnected = false;
  if(_machineSocket) {
    // 先摘掉回调，避免主动 close 触发 onclose→重连/轮询自恢复
    try {
      _machineSocket.onopen = null;
      _machineSocket.onmessage = null;
      _machineSocket.onclose = null;
      _machineSocket.onerror = null;
      _machineSocket.close();
    } catch(e) {}
    _machineSocket = null;
  }
  _machineSocketConnected = false;
}

setInterval(() => { updateSideHeaderStatus(); updateKpis(); updateHeaderMetrics(); }, 1000);

resetDemo();
restoreBackendSession();
[1,2,3,4].forEach(id => { if(channelConfigAssignments[id] && !getProfileById(channelConfigAssignments[id])) channelConfigAssignments[id] = null; assignConfigToChannel(id, channelConfigAssignments[id], false); });
  if(window.digitalTwin?.engineering) {
    window.digitalTwin.engineering.getConfigSectionForm = function(sectionKey) {
      const key = normalizeConfigSectionKey(sectionKey || activeConfigSection);
      const section = document.querySelector(`[data-rendered-section="${key}"]`) || document.getElementById('configActiveSection') || document.getElementById('configPane');
      const data = {};
      section?.querySelectorAll('input, select, textarea').forEach(node => { if(node.id) data[node.id] = node.type === 'checkbox' ? node.checked : node.value; });
      return data;
    };
  }

renderDebugPane();
